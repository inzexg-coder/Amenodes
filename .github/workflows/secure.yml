name: Secure Deploy

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Block workflow changes
        run: |
          OWNER=$(curl -s https://api.github.com/repos/${{ github.repository }} | jq -r '.owner.login')
          
          if [ "${{ github.actor }}" != "$OWNER" ]; then
            git fetch origin main
            git diff origin/main -- .github/workflows/ | grep -q '^+' && exit 1
            ls .github/workflows/*.yml | while read f; do
              grep -q "$(basename $f)" <(git ls-tree origin/main .github/workflows/) || exit 1
            done
          fi
