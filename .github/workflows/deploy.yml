name: Deploy Amenodes

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  create:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview-update:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "name=${BRANCH//\//-}" >> $GITHUB_OUTPUT
      - name: Deploy
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USERNAME }}
          PASS: ${{ secrets.SFTP_PASSWORD }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          lftp -u "$USER","$PASS" sftp://"$HOST" <<EOF
          rm -rf /var/www/html/preview/$BRANCH
          mkdir -p /var/www/html/preview/$BRANCH
          mirror -R --delete --exclude=.git --exclude=.github --exclude=preview --exclude=backups --exclude=index --exclude=index.html ./ /var/www/html/preview/$BRANCH/
          echo $(date +%s) > /var/www/html/preview/$BRANCH/.deploy_time
          echo ${{ github.sha }} > /var/www/html/preview/$BRANCH/.commit_sha
          quit
          EOF
      - name: Show URL
        run: |
          echo "Preview: https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html"

  pr-comment:
    runs-on: ubuntu-latest
    needs: preview-update
    if: github.event_name == 'pull_request'
    steps:
      - name: Get branch
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "name=${BRANCH//\//-}" >> $GITHUB_OUTPUT
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html`;
            const body = `## Preview updated\n\n**URL:** ${url}\n**Commit:** ${{ github.sha }}`;
            const issue = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue,
              body: body
            });

  cleanup-old-previews:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Cleanup
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USERNAME }}
          PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          NOW=$(date +%s)
          EXP=$((NOW - 600))
          lftp -u "$USER","$PASS" sftp://"$HOST" <<EOF
          cls -1 /var/www/html/preview/
          quit
          EOF > /tmp/preview_dirs.txt
          while read dir; do
            if [ -z "$dir" ] || [ "$dir" = "." ] || [ "$dir" = ".." ]; then continue; fi
            time=$(lftp -u "$USER","$PASS" sftp://"$HOST" -e "cat /var/www/html/preview/$dir/.deploy_time; quit" 2>/dev/null)
            if [ -n "$time" ] && [ "$time" -lt "$EXP" ]; then
              lftp -u "$USER","$PASS" sftp://"$HOST" -e "rm -rf /var/www/html/preview/$dir; quit"
              echo "Deleted $dir"
            fi
          done < /tmp/preview_dirs.txt

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        env:
          HOST: ${{ secrets.SFTP_HOST }}
          USER: ${{ secrets.SFTP_USERNAME }}
          PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "$USER","$PASS" sftp://"$HOST" <<EOF
          mirror -R --delete --exclude=.git --exclude=.github --exclude=preview --exclude=backups --exclude=index --exclude=index.html ./ /var/www/html/
          quit
          EOF
      - name: URL
        run: echo "Production: https://${{ secrets.SFTP_HOST }}/amenodes.html"
