name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  OWNER_USERNAME: "inzexg-coder"

jobs:
  check-workflow-files:
    runs-on: ubuntu-latest
    outputs:
      workflow_changed: ${{ steps.check.outputs.workflow_changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      
      - name: Check if workflow files were changed by non-owner
        id: check
        run: |
          AUTHOR="${{ github.actor }}"
          OWNER="$OWNER_USERNAME"
          
          echo "Author: $AUTHOR"
          echo "Owner: $OWNER"

          if [ "$AUTHOR" = "$OWNER" ]; then
            echo "workflow_changed=false" >> $GITHUB_OUTPUT
            echo "Owner is making changes, skipping workflow file check"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '\.github/workflows/|\.github/CODEOWNERS'; then
            echo "workflow_changed=true" >> $GITHUB_OUTPUT
            echo "::error::Workflow files cannot be modified by non-owner users!"
            echo "::error::User $AUTHOR attempted to modify protected files"
            echo "::error::Modified files:"
            echo "$CHANGED_FILES" | grep -E '\.github/workflows/|\.github/CODEOWNERS'
            exit 1
          fi
          
          echo "workflow_changed=false" >> $GITHUB_OUTPUT
          echo "No protected files were modified"

  security-check:
    runs-on: ubuntu-latest
    needs: check-workflow-files
    if: needs.check-workflow-files.outputs.workflow_changed != 'true'
    outputs:
      is_allowed: ${{ steps.check.outputs.is_allowed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Check author permissions
        id: check
        run: |
          AUTHOR="${{ github.actor }}"
          if [ "$AUTHOR" = "$OWNER_USERNAME" ]; then
            echo "is_allowed=true" >> $GITHUB_OUTPUT
          else
            echo "is_allowed=false" >> $GITHUB_OUTPUT
            echo "::error::User $AUTHOR is not allowed"
            exit 1
          fi

  validate:
    runs-on: ubuntu-latest
    needs: [check-workflow-files, security-check]
    if: |
      needs.check-workflow-files.outputs.workflow_changed != 'true' &&
      needs.security-check.outputs.is_allowed == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*" -not -path "./node_modules/*"); do
            node -c "$file" || exit 1
          done
      
      - name: Check HTML
        run: |
          if [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview:
    runs-on: ubuntu-latest
    needs: [check-workflow-files, security-check, validate]
    if: |
      needs.check-workflow-files.outputs.workflow_changed != 'true' &&
      needs.security-check.outputs.is_allowed == 'true' &&
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.head_ref }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Deploy preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      
      - name: Set preview URL
        id: url
        run: |
          URL="https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html"
          echo "url=$URL" >> $GITHUB_OUTPUT
      
      - name: Comment PR with preview link
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.url.outputs.url }}';
            const body = `## Preview Deployment\n\nPreview available at: ${url}\n\nBranch: ${{ github.head_ref }}\n\nCommit: ${{ github.sha }}`;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingComment = comments.find(c => 
              c.body && c.body.includes('Preview Deployment')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  production:
    runs-on: ubuntu-latest
    needs: [check-workflow-files, security-check, validate]
    if: |
      needs.check-workflow-files.outputs.workflow_changed != 'true' &&
      needs.security-check.outputs.is_allowed == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/
          "
      
      - name: Output production URL
        run: |
          echo "Production deployed to: https://${{ secrets.SFTP_HOST }}/amenodes.html"
