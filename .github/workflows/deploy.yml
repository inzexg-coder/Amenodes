name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  create:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview-update:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Update timestamp
        id: timestamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - name: Deploy with force overwrite
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            rm -rf /var/www/html/preview/${{ steps.branch.outputs.name }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete --verbose \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              --exclude='index' \
              --exclude='index.html' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Update deployment timestamp
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            echo '${{ steps.timestamp.outputs.time }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
            echo '${{ github.sha }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          "
      - name: Verify deployment
        run: |
          echo "Deployed to: https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
      - name: Add to GitHub Summary
        run: |
          echo "## Preview Updated" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html" >> $GITHUB_STEP_SUMMARY

  pr-comment:
    runs-on: ubuntu-latest
    needs: preview-update
    if: github.event_name == 'pull_request'
    steps:
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.head_ref }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Build preview URL
        id: url
        run: echo "url=https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html" >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.url.outputs.url }}';
            const sha = '${{ github.sha }}';
            const branch = '${{ github.head_ref }}';
            const message = '## Preview deployment updated!\n\n' +
              '**Preview URL:** [' + previewUrl + '](' + previewUrl + ')\n' +
              '**Commit:** `' + sha.substring(0, 7) + '`\n' +
              '**Branch:** `' + branch + '`\n\n' +
              '> Clear browser cache (Ctrl+Shift+R) if changes do not appear.';
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message
              });
            }

  cleanup-old-previews:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Cleanup expired previews
        run: |
          CURRENT_TIME=$(date +%s)
          EXPIRATION_TIME=$((CURRENT_TIME - 600))
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            cls -1 /var/www/html/preview/
          " | while read PREVIEW_DIR; do
            if [ -z "$PREVIEW_DIR" ] || [ "$PREVIEW_DIR" = "." ] || [ "$PREVIEW_DIR" = ".." ]; then
              continue
            fi
            lftp -c "
              set sftp:auto-confirm yes
              open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
              get -o /tmp/deploy_time_$PREVIEW_DIR /var/www/html/preview/$PREVIEW_DIR/.deploy_time 2>/dev/null || echo ''
            " 2>/dev/null
            if [ -f "/tmp/deploy_time_$PREVIEW_DIR" ]; then
              DEPLOY_TIME=$(cat "/tmp/deploy_time_$PREVIEW_DIR")
              rm "/tmp/deploy_time_$PREVIEW_DIR"
              if [ -n "$DEPLOY_TIME" ] && [ "$DEPLOY_TIME" -lt "$EXPIRATION_TIME" ]; then
                echo "Deleting expired preview: $PREVIEW_DIR"
                lftp -c "
                  set sftp:auto-confirm yes
                  open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
                  rm -rf /var/www/html/preview/$PREVIEW_DIR/
                "
              fi
            fi
          done

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete --verbose \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              --exclude='index' \
              --exclude='index.html' \
              ./ /var/www/html/
          "
      - name: Output production URL
        run: echo "Production deployed to: https://${{ secrets.SFTP_HOST }}/amenodes.html"
