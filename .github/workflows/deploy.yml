name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "index.html" ]; then
            grep -q "<!DOCTYPE html>" index.html || exit 1
          elif [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.head_ref }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Set preview URL
        id: url
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          URL="https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/${MAIN_FILE}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"
      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.url }}';
            const body = `## Preview Deployment\n\nPreview available at: ${url}\n\nBranch: ${{ github.head_ref }}\n\nCommit: ${{ github.sha }}`;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingComment = comments.find(c => 
              c.body && c.body.includes('Preview Deployment')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/
          "
      - name: Output production URL
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          echo "Production deployed to: https://${{ secrets.SFTP_HOST }}/${MAIN_FILE}"
