name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
  create:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "index.html" ]; then
            grep -q "<!DOCTYPE html>" index.html || exit 1
          elif [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview-prepare:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'create' && github.event.ref_type == 'branch' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.event.ref }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Create timestamp for preview
        id: timestamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - name: Deploy preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Save deployment info
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            echo '${{ steps.timestamp.outputs.time }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
            echo '${{ github.sha }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          "
      - name: Get preview URL
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          PREVIEW_URL="https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/${MAIN_FILE}"
          echo "✅ Preview deployed at: $PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT

  preview-update:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Update timestamp
        id: timestamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - name: Deploy/update preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Update deployment timestamp
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            echo '${{ steps.timestamp.outputs.time }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
            echo '${{ github.sha }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          "
      - name: Get preview URL
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          PREVIEW_URL="https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/${MAIN_FILE}"
          echo "✅ Preview updated at: $PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
      - name: Add to GitHub Summary
        run: |
          echo "## 🚀 Preview Deployment Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** [Click here](${{ env.PREVIEW_URL }})" >> $GITHUB_STEP_SUMMARY
          echo "**Expires:** 10 minutes after last commit" >> $GITHUB_STEP_SUMMARY

  cleanup-old-previews:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Cleanup expired previews
        run: |
          CURRENT_TIME=$(date +%s)
          EXPIRATION_TIME=$((CURRENT_TIME - 600))
          
          # Получаем список preview директорий
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            cls -1 /var/www/html/preview/
          " | while read PREVIEW_DIR; do
            if [ -z "$PREVIEW_DIR" ] || [ "$PREVIEW_DIR" == "." ] || [ "$PREVIEW_DIR" == ".." ]; then
              continue
            fi
            
            # Скачиваем файл с временем деплоя
            lftp -c "
              set sftp:auto-confirm yes
              open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
              get -o /tmp/deploy_time_$PREVIEW_DIR /var/www/html/preview/$PREVIEW_DIR/.deploy_time 2>/dev/null || echo 'NOT_EXISTS'
            " 2>/dev/null
            
            if [ -f "/tmp/deploy_time_$PREVIEW_DIR" ]; then
              DEPLOY_TIME=$(cat "/tmp/deploy_time_$PREVIEW_DIR")
              rm "/tmp/deploy_time_$PREVIEW_DIR"
              
              if [ "$DEPLOY_TIME" -lt "$EXPIRATION_TIME" ]; then
                echo "Deleting expired preview: $PREVIEW_DIR (last updated: $(date -d @$DEPLOY_TIME))"
                lftp -c "
                  set sftp:auto-confirm yes
                  open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
                  rm -rf /var/www/html/preview/$PREVIEW_DIR/
                "
              else
                echo "Keeping preview: $PREVIEW_DIR (last updated: $(date -d @$DEPLOY_TIME))"
              fi
            fi
          done

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/
          "
      - name: Output production URL
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          echo "✅ Production deployed to: https://${{ secrets.SFTP_HOST }}/${MAIN_FILE}"
