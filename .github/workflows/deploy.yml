name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          [ -f "amenodes.html" ] || exit 1
          grep -q "<!DOCTYPE html>" amenodes.html || exit 1

  preview:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='index' \
              --exclude='index.html' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='index' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/
          "
