name: Deploy Amenodes

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  deploy-preview:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: |
          BRANCH="${{ github.ref_name }}"
          BRANCH_CLEAN=$(echo "$BRANCH" | sed 's/\//-/g')
          echo "name=$BRANCH_CLEAN" >> $GITHUB_OUTPUT
          echo "raw=$BRANCH" >> $GITHUB_OUTPUT
      - name: Deploy preview
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://"${{ secrets.SFTP_HOST }}" <<EOF
          rm -rf /var/www/html/preview/${{ steps.branch.outputs.name }}
          mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
          mirror -R --delete --exclude=.git --exclude=.github --exclude=preview --exclude=backups --exclude=index --exclude=index.html ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          echo "$(date +%s)" > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
          echo "${{ github.sha }}" > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          quit
          EOF
      - name: Show URL
        run: |
          echo "Preview URL: https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html"
          echo "Branch: ${{ steps.branch.outputs.raw }}"

  comment-pr:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    steps:
      - name: Get branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          BRANCH_CLEAN=$(echo "$BRANCH" | sed 's/\//-/g')
          echo "name=$BRANCH_CLEAN" >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/amenodes.html`;
            const body = `## Preview deployment successful!
            
            **Preview URL:** ${url}
            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\`
            
            > Clear browser cache (Ctrl+Shift+R) if changes don't appear.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://"${{ secrets.SFTP_HOST }}" <<EOF
          mirror -R --delete --exclude=.git --exclude=.github --exclude=preview --exclude=backups --exclude=index --exclude=index.html ./ /var/www/html/
          quit
          EOF
      - name: Show URL
        run: echo "Production: https://${{ secrets.SFTP_HOST }}/amenodes.html"

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Clean old previews
        run: |
          NOW=$(date +%s)
          LIMIT=$((NOW - 600))
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://"${{ secrets.SFTP_HOST }}" -e "cls -1 /var/www/html/preview/; quit" | while read dir; do
            [ -z "$dir" ] || [ "$dir" = "." ] || [ "$dir" = ".." ] && continue
            time=$(lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://"${{ secrets.SFTP_HOST }}" -e "cat /var/www/html/preview/$dir/.deploy_time 2>/dev/null || echo '0'; quit" 2>/dev/null)
            if [ "$time" -lt "$LIMIT" ]; then
              echo "Removing $dir"
              lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://"${{ secrets.SFTP_HOST }}" -e "rm -rf /var/www/html/preview/$dir; quit"
            fi
          done
