name: Deploy Amenodes

on:
  push:
    branches:
      - main
      - master
    branches-ignore:
      - '**'
  create:
    branches:
      - '*'
  schedule:
    - cron: '*/10 * * * *'  #

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for file in $(find . -name "*.js" -type f -not -path "./.git/*"); do
            node -c "$file" || exit 1
          done
      - name: Check HTML
        run: |
          if [ -f "index.html" ]; then
            grep -q "<!DOCTYPE html>" index.html || exit 1
          elif [ -f "amenodes.html" ]; then
            grep -q "<!DOCTYPE html>" amenodes.html || exit 1
          else
            exit 1
          fi

  preview-prepare:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.event.ref }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Create timestamp for preview
        id: timestamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - name: Deploy preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Save deployment info
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            echo '${{ steps.timestamp.outputs.time }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
            echo '${{ github.sha }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          "

  preview-update:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Get branch name
        id: branch
        run: echo "name=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      - name: Update timestamp
        id: timestamp
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT
      - name: Deploy/update preview
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mkdir -p /var/www/html/preview/${{ steps.branch.outputs.name }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/preview/${{ steps.branch.outputs.name }}/
          "
      - name: Update deployment timestamp
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            echo '${{ steps.timestamp.outputs.time }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.deploy_time
            echo '${{ github.sha }}' > /var/www/html/preview/${{ steps.branch.outputs.name }}/.commit_sha
          "
      - name: Set preview URL
        id: url
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          URL="https://${{ secrets.SFTP_HOST }}/preview/${{ steps.branch.outputs.name }}/${MAIN_FILE}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview updated: $URL"

  cleanup-old-previews:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Cleanup expired previews
        run: |
          CURRENT_TIME=$(date +%s)
          EXPIRATION_TIME=$((CURRENT_TIME - 600))  # 10 минут = 600 секунд
          
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            cls -1 /var/www/html/preview/
          " | while read PREVIEW_DIR; do
            if [ -z "$PREVIEW_DIR" ] || [ "$PREVIEW_DIR" == "." ] || [ "$PREVIEW_DIR" == ".." ]; then
              continue
            fi
            
            DEPLOY_TIME_FILE="/var/www/html/preview/$PREVIEW_DIR/.deploy_time"
            
            lftp -c "
              set sftp:auto-confirm yes
              open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
              get -o /tmp/deploy_time_$PREVIEW_DIR $DEPLOY_TIME_FILE 2>/dev/null || echo 'NOT_EXISTS'
            "
            
            if [ -f "/tmp/deploy_time_$PREVIEW_DIR" ]; then
              DEPLOY_TIME=$(cat "/tmp/deploy_time_$PREVIEW_DIR")
              rm "/tmp/deploy_time_$PREVIEW_DIR"
              
              if [ "$DEPLOY_TIME" -lt "$EXPIRATION_TIME" ]; then
                echo "Deleting expired preview: $PREVIEW_DIR (last updated: $DEPLOY_TIME)"
                lftp -c "
                  set sftp:auto-confirm yes
                  open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
                  rm -rf /var/www/html/preview/$PREVIEW_DIR/
                "
              fi
            fi
          done

  production:
    runs-on: ubuntu-latest
    needs: validate
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy production
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            mirror -R --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='preview' \
              --exclude='backups' \
              ./ /var/www/html/
          "
      - name: Output production URL
        run: |
          if [ -f "index.html" ]; then
            MAIN_FILE="index.html"
          else
            MAIN_FILE="amenodes.html"
          fi
          echo "Production deployed to: https://${{ secrets.SFTP_HOST }}/${MAIN_FILE}"
