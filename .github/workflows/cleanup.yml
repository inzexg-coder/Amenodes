name: Cleanup Old Previews

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Remove old previews
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            cd /var/www/html/preview/ 2>/dev/null || exit 0
            cls -1 | while read dir; do
              if [ -d \"\$dir\" ] && [ \"\$dir\" != \".\" ] && [ \"\$dir\" != \"..\" ]; then
                rm -rf \"\$dir\"
                echo \"Removed: \$dir\"
              fi
            done
          "
