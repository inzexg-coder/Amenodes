name: Cleanup Old Previews

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    name: Clean Previews Older Than 14 Days
    runs-on: ubuntu-latest
    
    steps:
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Remove old preview folders
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}
            cd /var/www/html/preview/ 2>/dev/null || exit 0
            cls -1 | while read dir; do
              if [ -d \"\$dir\" ] && [ \"\$dir\" != \".\" ] && [ \"\$dir\" != \"..\" ]; then
                dir_date=\$(echo \$dir | grep -oP '\\d{8}' | head -1)
                if [ -n \"\$dir_date\" ]; then
                  dir_seconds=\$(date -d \"\${dir_date:0:4}-\${dir_date:4:2}-\${dir_date:6:2}\" +%s 2>/dev/null || echo 0)
                  today_seconds=\$(date +%s)
                  days_old=\$(( (today_seconds - dir_seconds) / 86400 ))
                  if [ \$days_old -gt 14 ]; then
                    echo \"Removing: \$dir (age: \$days_old days)\"
                    rm -rf \"\$dir\"
                  fi
                fi
              fi
            done
          "
