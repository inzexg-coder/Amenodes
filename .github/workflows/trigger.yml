name: Trigger CI Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  trigger-preview:
    name: Trigger preview deployment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        id: extract_branch
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "sanitized_branch=$(echo ${BRANCH_NAME} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
      
      - name: Comment about deployment start
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const branch = '${{ steps.extract_branch.outputs.branch_name }}';
            const sha = '${{ github.event.pull_request.head.sha }}';
            const actor = '${{ github.actor }}';
            
            const body = `## 🚀 Deployment started\n\n` +
              `| | |\n|---|---|\n` +
              `| **Status** | ⏳ Building and deploying... |\n` +
              `| **Branch** | \`${branch}\` |\n` +
              `| **Commit** | \`${sha.substring(0, 7)}\` |\n` +
              `| **Triggered by** | @${actor} |\n\n` +
              `### 📋 What happens now\n\n` +
              `1. 🔄 Generating \`nodes-list.json\` from \`src/nodes/\`\n` +
              `2. ☁️ Uploading to preview server\n` +
              `3. ✅ Comment will be updated when ready\n\n` +
              `---\n` +
              `*Deployment started at ${new Date().toISOString()}*`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const oldComments = comments.filter(c => 
              c.user.type === 'Bot' && 
              c.body && c.body.includes('Deployment started')
            );
            for (const old of oldComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: old.id
              });
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
      
      - name: Trigger CI via GitHub API
        env:
          GH_TOKEN: ${{ secrets.CI_REPO_TOKEN }}
          PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/inzexg-coder/amenodes-ci/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "source_repo": "${{ github.repository }}",
                "source_ref": "${{ github.ref }}",
                "source_sha": "${{ github.event.pull_request.head.sha }}",
                "head_ref": "${{ steps.extract_branch.outputs.branch_name }}",
                "pr_number": "${{ github.event.pull_request.number }}",
                "actor": "${{ github.actor }}"
              }
            }'

  trigger-production:
    name: Trigger production deployment
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Log deployment start
        run: |
          echo "::notice::Production deployment triggered for ${{ github.ref_name }}"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
      
      - name: Trigger CI via GitHub API
        env:
          GH_TOKEN: ${{ secrets.CI_REPO_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/inzexg-coder/amenodes-ci/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "source_repo": "${{ github.repository }}",
                "source_ref": "${{ github.ref }}",
                "source_sha": "${{ github.sha }}",
                "head_ref": "${{ github.ref_name }}",
                "actor": "${{ github.actor }}"
              }
            }'
