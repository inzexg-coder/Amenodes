name: Trigger CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "head_ref=" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate HMAC signature inside payload
        id: sign
        run: |
          BASE_PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ steps.pr.outputs.head_sha }}" \
            --arg pr "${{ steps.pr.outputs.pr_number }}" \
            --arg head "${{ steps.pr.outputs.head_ref }}" \
            --arg actor "${{ github.actor }}" \
            '{
              event_type: "deploy",
              client_payload: {
                source_repo: $repo,
                source_ref: $ref,
                source_sha: $sha,
                pr_number: $pr,
                head_ref: $head,
                actor: $actor
              }
            }')
          
          SIGNATURE=$(echo -n "$BASE_PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DISPATCH_SECRET }}" | cut -d ' ' -f2)
          FINAL_PAYLOAD=$(echo "$BASE_PAYLOAD" | jq --arg sig "$SIGNATURE" '.client_payload.signature = $sig')
          
          echo "$FINAL_PAYLOAD" > payload.json
      
      - name: Trigger CI repository
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CI_TOKEN }}" \
            https://api.github.com/repos/inzexg-coder/amenodes-ci/dispatches \
            --data @payload.json
