name: Trigger CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "head_ref=" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate HMAC signature
        id: sign
        run: |
          CLIENT_PAYLOAD=$(jq -c --sort-keys -n \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ steps.pr.outputs.head_sha }}" \
            --arg pr "${{ steps.pr.outputs.pr_number }}" \
            --arg head "${{ steps.pr.outputs.head_ref }}" \
            --arg actor "${{ github.actor }}" \
            '{source_repo: $repo, source_ref: $ref, source_sha: $sha, pr_number: $pr, head_ref: $head, actor: $actor}')
          
          BASE_PAYLOAD=$(jq -c --sort-keys -n \
            --arg event_type "deploy" \
            --argjson client_payload "$CLIENT_PAYLOAD" \
            '{event_type: $event_type, client_payload: $client_payload}')
          
          SIGNATURE=$(echo -n "$BASE_PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DISPATCH_SECRET }}" | cut -d ' ' -f2)
          
          FINAL_PAYLOAD=$(jq -c -n \
            --arg event_type "deploy" \
            --argjson client_payload "$CLIENT_PAYLOAD" \
            --arg signature "$SIGNATURE" \
            '{event_type: $event_type, client_payload: $client_payload, signature: $signature}')
          
          echo "$FINAL_PAYLOAD" > payload.json
          cat payload.json
      
      - name: Trigger CI repository
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CI_TOKEN }}" \
            https://api.github.com/repos/inzexg-coder/amenodes-ci/dispatches \
            --data @payload.json
