name: Trigger CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Delete files not in source'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Debug info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
      
      - name: Trigger CI repository
        run: |
          CLEANUP="${{ github.event.inputs.cleanup }}"
          if [ -z "$CLEANUP" ]; then
            CLEANUP="false"
          fi
          
          echo "Sending request to amenodes-ci..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CI_TOKEN }}" \
            https://api.github.com/repos/inzexg-coder/amenodes-ci/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "source_repo": "${{ github.repository }}",
                "source_ref": "${{ github.ref }}",
                "source_sha": "${{ github.sha }}",
                "pr_number": "${{ github.event.pull_request.number }}",
                "head_ref": "${{ github.head_ref }}",
                "actor": "${{ github.actor }}",
                "cleanup": "'"$CLEANUP"'"
              }
            }')
          
          echo "Response: $RESPONSE"
          
          if [ -z "$RESPONSE" ]; then
            echo "✅ Request sent successfully"
          else
            echo "::warning::Response: $RESPONSE"
          fi
      
      - name: Wait for CI to start
        run: |
          echo "Waiting 5 seconds for CI to start..."
          sleep 5
          
          echo "Check CI repository at:"
          echo "https://github.com/inzexg-coder/amenodes-ci/actions"
