name: Trigger CI Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'src/nodes-list.json'  
  workflow_run:
    workflows: ["Update nodes list"] 
    types:
      - completed
    branches:
      - main
      - master

jobs:
  trigger:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CI_REPO_TOKEN }}
          repository: inzexg-coder/amenodes-ci
          event-type: deploy
          client-payload: |
            {
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}"
            }
