name: Preview Deployment

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get branch name
        id: branch-name
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
      
      - name: Deploy to preview folder via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /preview/${{ steps.branch-name.outputs.branch }}/
      
      - name: Create comment with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch-name.outputs.branch }}';
            const previewUrl = `https://amenoke.ru/preview/${branch}/amenodes.html`;

            if (context.payload.pull_request) {
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: ` Preview deployed - ${previewUrl}\n\n Branch: ${branch}\n\n ${new Date().toISOString()}`
              });
            }
            
            console.log(`Preview URL: ${previewUrl}`);
