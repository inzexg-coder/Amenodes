name: Update nodes list

on:
  push:
    paths:
      - 'src/nodes/*.js'
      - 'src/nodes/**/*.js'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      
      - name: Generate nodes list
        run: |
          echo "[" > src/nodes-list.json
          find src/nodes -maxdepth 1 -name "*.js" ! -name "index.js" ! -name "manifest.js" ! -name "translations.js" -type f | while read file; do
            filename=$(basename "$file")
            echo "  \"$filename\"," >> src/nodes-list.json
          done
          sed -i '$ s/,$//' src/nodes-list.json
          echo "]" >> src/nodes-list.json
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update nodes-list.json for ${{ github.ref_name }}"
          file_pattern: src/nodes-list.json
          branch: ${{ github.ref_name }}
      
      - name: Output result
        run: |
          echo "nodes-list.json updated for ${{ github.ref_name }}"
