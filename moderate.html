<div class="mod-container" id="container">
    <div class="loading"><i class="fas fa-spinner"></i> <span data-i18n="moderate.loading">Loading moderation panel...</span></div>
</div>

<script type="module">
    import { i18n, t } from './src/i18n/LanguageManager.js';
    
    function updateAllTexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key) el.textContent = t(key);
        });
        document.title = t('moderate.title');
    }
    
    i18n.subscribe(() => updateAllTexts());
    updateAllTexts();
    
    const API_BASE = 'https://amenoke.ru/api';
    let currentUser = null;
    
    function getToken() { return localStorage.getItem('auth_token'); }
    
    async function apiRequest(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        const token = getToken();
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }
    
    async function getCurrentUser() {
        const token = getToken();
        if (!token) return null;
        try { return await apiRequest('/me.php'); }
        catch { return null; }
    }
    
    async function getPendingTemplates() {
        return apiRequest('/search_templates.php?filter=all&limit=100');
    }
    
    async function moderateTemplate(id, action, level) {
        return apiRequest('/moderate_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: id, action, level: level || 'regular' })
        });
    }
    
    async function getTemplate(id) {
        return apiRequest(`/get_template.php?id=${id}`);
    }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function getLevelName(level) {
        return t(`moderate.${level}CP`);
    }
    
    window.showPreview = async (id) => {
        try {
            const data = await getTemplate(id);
            if (!data.success) { showToast(t('common.error'), 'error'); return; }
            const modal = document.createElement('div');
            modal.className = 'mod-preview-modal';
            modal.innerHTML = `<div class="mod-preview-content"><span class="mod-preview-close">&times;</span><h3>${escapeHtml(data.template.title)}</h3><p><strong>${t('moderate.author')}:</strong> ${escapeHtml(data.template.username)}</p><p><strong>${t('moderate.created')}:</strong> ${new Date(data.template.created_at).toLocaleString()}</p><p><strong>${t('common.description')}:</strong><br>${escapeHtml(data.template.description || t('common.noDescription'))}</p><hr><button class="mod-view" onclick="window.open('amenodes.html?template=${id}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#2d3a5e;color:#fff;border:none;cursor:pointer;">${t('moderate.openInEditor')}</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('.mod-preview-close').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        } catch (err) { showToast(err.message, 'error'); }
    };
    
    window.approveTemplate = async (id) => {
        const level = document.getElementById(`level-${id}`).value;
        if (confirm(t('moderate.approveConfirm').replace('{level}', getLevelName(level)))) {
            try { await moderateTemplate(id, 'approve', level); showToast(t('moderate.templateApproved'), 'success'); loadPendingTemplates(); } 
            catch (err) { showToast(err.message, 'error'); }
        }
    };
    
    window.rejectTemplate = async (id) => {
        if (confirm(t('moderate.rejectConfirm'))) {
            try { await moderateTemplate(id, 'reject'); showToast(t('moderate.templateRejected'), 'success'); loadPendingTemplates(); } 
            catch (err) { showToast(err.message, 'error'); }
        }
    };

        if
