<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="moderate.title">Moderation Panel</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html" data-i18n="moderate.editorLink">Editor</a>
        <a href="templates.html" data-i18n="moderate.templatesLink">Templates</a>
        <a href="profile.html" data-i18n="moderate.profileLink">Profile</a>
        <a href="moderate.html" class="active" data-i18n="moderate.moderateLink">Moderate</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="mod-container" id="container">
    <div class="loading"><i class="fas fa-spinner"></i> <span data-i18n="moderate.loading">Loading moderation panel...</span></div>
</div>

<script type="module">
    import { i18n, t } from './src/i18n/LanguageManager.js';
    
    function updateAllTexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key) el.textContent = t(key);
        });
        document.title = t('moderate.title');
    }
    
    i18n.subscribe(() => updateAllTexts());
    updateAllTexts();
    
    const API_BASE = 'https://amenoke.ru/api';
    let currentUser = null;
    
    function getToken() { return localStorage.getItem('auth_token'); }
    
    async function apiRequest(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        const token = getToken();
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }
    
    async function getCurrentUser() {
        const token = getToken();
        if (!token) return null;
        try { return await apiRequest('/me.php'); }
        catch { return null; }
    }
    
    async function getPendingTemplates() {
        return apiRequest('/search_templates.php?filter=all&limit=100');
    }
    
    async function moderateTemplate(id, action, level) {
        return apiRequest('/moderate_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: id, action, level: level || 'regular' })
        });
    }
    
    async function getTemplate(id) {
        return apiRequest(`/get_template.php?id=${id}`);
    }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function getLevelName(level) {
        return t(`moderate.${level}CP`);
    }
    
    window.showPreview = async (id) => {
        try {
            const data = await getTemplate(id);
            if (!data.success) { showToast(t('common.error'), 'error'); return; }
            const modal = document.createElement('div');
            modal.className = 'mod-preview-modal';
            modal.innerHTML = `<div class="mod-preview-content"><span class="mod-preview-close">&times;</span><h3>${escapeHtml(data.template.title)}</h3><p><strong>${t('moderate.author')}:</strong> ${escapeHtml(data.template.username)}</p><p><strong>${t('moderate.created')}:</strong> ${new Date(data.template.created_at).toLocaleString()}</p><p><strong>${t('common.description')}:</strong><br>${escapeHtml(data.template.description || t('common.noDescription'))}</p><hr><button class="mod-view" onclick="window.open('amenodes.html?template=${id}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#2d3a5e;color:#fff;border:none;cursor:pointer;">${t('moderate.openInEditor')}</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('.mod-preview-close').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        } catch (err) { showToast(err.message, 'error'); }
    };
    
    window.approveTemplate = async (id) => {
        const level = document.getElementById(`level-${id}`).value;
        if (confirm(t('moderate.approveConfirm').replace('{level}', getLevelName(level)))) {
            try { await moderateTemplate(id, 'approve', level); showToast(t('moderate.templateApproved'), 'success'); loadPendingTemplates(); } 
            catch (err) { showToast(err.message, 'error'); }
        }
    };
    
    window.rejectTemplate = async (id) => {
        if (confirm(t('moderate.rejectConfirm'))) {
            try { await moderateTemplate(id, 'reject'); showToast(t('moderate.templateRejected'), 'success'); loadPendingTemplates(); } 
            catch (err) { showToast(err.message, 'error'); }
        }
    };
    
    async function loadPendingTemplates() {
        const container = document.getElementById('templatesContainer');
        if (!container) return;
        container.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> ${t('common.loading')}</div>`;
        try {
            const data = await getPendingTemplates();
            const pendingOnly = (data.templates || []).filter(t => t.status === 'pending');
            const statsHtml = `<div class="stats-bar"><div class="stat-card"><div class="stat-value">${pendingOnly.length}</div><div class="stat-label">${t('moderate.pendingReview')}</div></div><div class="stat-card"><div class="stat-value">${data.templates?.length || 0}</div><div class="stat-label">${t('moderate.totalTemplates')}</div></div></div>`;
            if (pendingOnly.length === 0) { container.innerHTML = statsHtml + `<div class="empty-state"><i class="fas fa-check-circle"></i><p>${t('moderate.noPending')}</p><small>${t('moderate.allReviewed')}</small></div>`; return; }
            container.innerHTML = statsHtml + `<div class="mod-table-container"><table class="mod-table"><thead><tr><th>${t('moderate.id')}</th><th>${t('moderate.title')}</th><th>${t('moderate.author')}</th><th>${t('moderate.created')}</th><th>${t('moderate.level')}</th><th>${t('moderate.actions')}</th></thead><tbody>${pendingOnly.map(tpl => `<tr><td>${tpl.id}</td><td><strong>${escapeHtml(tpl.title)}</strong><br><small>${escapeHtml((tpl.description || '').substring(0, 50))}${tpl.description?.length > 50 ? '...' : ''}</small></td><td>${escapeHtml(tpl.username)}</td><td>${new Date(tpl.created_at).toLocaleDateString()}</td><td><select id="level-${tpl.id}" class="mod-select"><option value="regular">${t('moderate.regularCP')}</option><option value="featured">${t('moderate.featuredCP')}</option><option value="epic">${t('moderate.epicCP')}</option><option value="legendary">${t('moderate.legendaryCP')}</option><option value="godlike">${t('moderate.godlikeCP')}</option></select></td><td><button class="mod-view" onclick="window.showPreview(${tpl.id})">${t('moderate.preview')}</button> <button class="mod-approve" onclick="window.approveTemplate(${tpl.id})">${t('moderate.approve')}</button> <button class="mod-reject" onclick="window.rejectTemplate(${tpl.id})">${t('moderate.reject')}</button></td></tr>`).join('')}</tbody></table></div>`;
        } catch (err) { container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${t('common.error')}</p><small>${err.message}</small></div>`; }
    }
    
    function updateAuthUI() {
        const authSection = document.getElementById('authSection');
        if (currentUser) {
            authSection.innerHTML = `<div class="user-panel"><span class="user-name">${escapeHtml(currentUser.username)}</span><span class="mod-badge">${currentUser.role === 'admin' ? t('moderate.adminBadge') : t('moderate.modBadge')}</span><span class="user-points">${currentUser.creator_points} CP</span><button id="logoutBtn" style="background:none;border:none;color:#ffb347;cursor:pointer;">${t('moderate.logout')}</button></div>`;
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('auth_token'); window.location.reload(); };
        } else {
            authSection.innerHTML = `<a href="amenodes.html" style="background:#ffb347;color:#1a1f30;padding:6px 16px;border-radius:30px;text-decoration:none;">${t('moderate.login')}</a>`;
        }
    }
    
    (async () => {
        const container = document.getElementById('container');
        try {
            const data = await getCurrentUser();
            if (data?.success && (data.user.role === 'moderator' || data.user.role === 'admin')) {
                currentUser = data.user;
                updateAuthUI();
                container.innerHTML = `<div id="templatesContainer" class="templates-list"><div class="loading"><i class="fas fa-spinner"></i> ${t('common.loading')}</div></div>`;
                await loadPendingTemplates();
            } else {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-ban"></i><p>${t('moderate.accessDenied')}</p><small>${t('moderate.noPermissions')}</small><br><br><a href="amenodes.html" class="mod-view" style="display:inline-block;padding:8px 20px;border-radius:30px;text-decoration:none;">${t('moderate.backToEditor')}</a></div>`;
                updateAuthUI();
            }
        } catch (err) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${t('common.error')}</p><small>${err.message}</small><br><br><a href="amenodes.html" class="mod-view" style="display:inline-block;padding:8px 20px;border-radius:30px;text-decoration:none;">${t('moderate.backToEditor')}</a></div>`;
            updateAuthUI();
        }
    })();
</script>
</body>
</html>
