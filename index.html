<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Amenodes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1a202c;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}

.chat{display:flex;flex-direction:column;height:100dvh}
.msgs{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:720px;margin:0 auto;width:100%}
.msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.user{background:#5a67d8;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.msg.bot{background:#f3f4f6;align-self:flex-start;border-bottom-left-radius:3px;display:flex;gap:8px;padding:10px}
.msg .ava{width:28px;height:28px;min-width:28px;border-radius:50%;background:#5a67d8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;margin-top:2px}
.msg .bd{flex:1;min-width:0}
.msg .time{font-size:10px;color:#9ca3af;margin-top:4px;text-align:right}
.msg.user .time{color:rgba(255,255,255,0.6)}
.msg.bot h1,.msg.bot h2,.msg.bot h3,.msg.bot h4{font-weight:600;margin:6px 0 2px;font-size:inherit}
.msg.bot code{padding:1px 4px;background:#e5e7eb;border-radius:3px;font-size:12px;font-family:monospace}
.msg.bot pre{margin:6px 0;padding:10px;background:#f9fafb;border-radius:6px;overflow-x:auto;border:1px solid #e5e7eb}
.msg.bot pre code{background:none;padding:0}
.msg.bot ul,.msg.bot ol{margin:4px 0;padding-left:18px}
.msg.bot li{margin:2px 0}
.msg.bot p{margin:3px 0}

.input-area{padding:10px 12px 14px;border-top:1px solid #e5e7eb;background:#fff}
.input-wrap{display:flex;gap:8px;max-width:720px;margin:0 auto}
.input-wrap input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid #d1d5db;background:#f9fafb;color:#111827;font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none}
.input-wrap input:focus{border-color:#5a67d8;background:#fff}
.input-wrap input::placeholder{color:#9ca3af}
.input-wrap button{width:40px;height:40px;border-radius:50%;background:#5a67d8;color:#fff;border:none;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.input-wrap button:active{background:#4c51bf}

.welcome{text-align:center;padding:80px 24px 40px}
.welcome h1{font-size:22px;font-weight:600;margin-bottom:8px}
.welcome p{font-size:13px;color:#6b7280}
</style>
</head>
<body>
<div class="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <h1>Чем могу помочь?</h1>
      <p>AI-агент для научных данных. Расчёты, графики, отчёты.</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Спроси о расчётах..." autofocus onkeypress="if(event.key==='Enter')send()">
      <button onclick="send()"><i class="fas fa-arrow-up"></i></button>
    </div>
  </div>
</div>
<script>
var msgs=document.getElementById('msgs');
var input=document.getElementById('input');
var welcome=document.getElementById('welcome');
var hist=JSON.parse(localStorage.getItem('amenodes_chat')||'[]');

function renderMsg(role,text,time){
  var d=document.createElement('div');
  d.className='msg '+role;
  if(role==='bot'){
    d.innerHTML='<div class="ava"><i class="fas fa-atom"></i></div><div class="bd"><div>'+mark(text)+'</div><div class="time">'+time+'</div></div>';
  }else{
    d.innerHTML='<div class="bd"><div>'+text+'</div><div class="time">'+time+'</div></div>';
  }
  return d;
}

function mark(t){
  try{return marked.parse(t)}catch(e){return t}
}

function timeNow(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

// Load history (render only, no save)
if(hist.length){
  welcome.style.display='none';
  hist.forEach(function(m){msgs.appendChild(renderMsg(m.role,m.text,m.time))});
  msgs.scrollTop=msgs.scrollHeight;
}

function addAndSave(role,text){
  welcome.style.display='none';
  var t=timeNow();
  msgs.appendChild(renderMsg(role,text,t));
  msgs.scrollTop=msgs.scrollHeight;
  hist.push({role:role,text:text,time:t});
  localStorage.setItem('amenodes_chat',JSON.stringify(hist));
}

function send(){
  var t=input.value.trim();
  if(!t)return;
  addAndSave('user',t);
  input.value='';
  var l=t.toLowerCase();
  if(l.includes('привет')){
    addAndSave('bot','Привет! Я AI-агент **Amenodes**. Помогу с расчётами, графиками и отчётами.\n\nОпишите задачу или загрузите данные — я запущу расчёты в графовом редакторе.');
  } else if(l.includes('/calculate')||l.includes('посчитай')){
    addAndSave('bot','Для расчёта:\n1. Откройте **вкладку Граф**\n2. Создайте ноду с данными\n3. Подключите вычисления\n\nИли введите значения прямо здесь — построю формулу.');
  } else if(l.includes('/plot')||l.includes('график')){
    addAndSave('bot','Построю график: scatter, line, histogram с планками погрешностей.\n\nЗагрузите данные через **DataNode** в графе или напишите значения в чат.');
  } else if(l.includes('/report')){
    addAndSave('bot','Сгенерирую отчёт в PDF/LaTeX по вашему графу.\n\nОткройте **ReportNode** в редакторе, настройте шаблон — получите готовый документ.');
  } else if(l.includes('помощь')||l==='help'){
    addAndSave('bot','**Команды Amenodes:**\n\n- `/calculate` — расчёт данных\n- `/plot` — построение графика\n- `/report` — генерация отчёта\n\nИли просто опишите задачу своими словами.');
  } else {
    addAndSave('bot','Понял! Работаю над: **«'+t+'»**\n\nДля полноценной работы с данными откройте **графовый редактор** — там можно загрузить данные, построить вычислительный пайплайн и получить результат.');
  }
}
</script>
</body>
</html>
