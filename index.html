<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Amenodes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1a202c;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* Chat */
.chat{display:flex;flex-direction:column;height:100vh}
.msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:768px;margin:0 auto;width:100%}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word}
.msg.user{background:#5a67d8;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#f3f4f6;align-self:flex-start}
.msg .avatar{width:28px;height:28px;border-radius:50%;background:#5a67d8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;margin-bottom:6px}
.msg .content{display:flex;gap:10px}
.msg .text{flex:1}
.msg .time{font-size:10px;color:#9ca3af;margin-top:4px;text-align:right}
.msg.user .time{color:rgba(255,255,255,0.6)}
.msg.bot h1,.msg.bot h2,.msg.bot h3{font-size:inherit;font-weight:600;margin:8px 0 4px}
.msg.bot code{padding:2px 5px;background:#e5e7eb;border-radius:3px;font-size:12px;font-family:monospace}
.msg.bot pre{margin:8px 0;padding:10px;background:#f9fafb;border-radius:6px;overflow-x:auto;border:1px solid #e5e7eb}
.msg.bot pre code{background:none;padding:0}
.msg.bot ul,.msg.bot ol{margin:4px 0;padding-left:18px}
.msg.bot li{margin:2px 0}
.msg.bot p{margin:4px 0}
.msg.bot strong{font-weight:600;color:#111827}

/* Input */
.input-area{padding:12px 16px 16px;border-top:1px solid #e5e7eb;background:#fff}
.input-wrap{display:flex;gap:8px;max-width:768px;margin:0 auto}
.input-wrap input{flex:1;padding:11px 16px;border-radius:24px;border:1px solid #d1d5db;background:#f9fafb;color:#111827;font-size:14px;outline:none;font-family:inherit}
.input-wrap input:focus{border-color:#5a67d8;background:#fff}
.input-wrap input::placeholder{color:#9ca3af}
.input-wrap button{width:42px;height:42px;border-radius:50%;background:#5a67d8;color:#fff;border:none;font-size:14px;cursor:pointer;flex-shrink:0}
.input-wrap button:hover{background:#4c51bf}

/* Welcome */
.welcome{text-align:center;padding:100px 24px 40px}
.welcome h1{font-size:24px;font-weight:600;margin-bottom:8px}
.welcome p{font-size:13px;color:#6b7280}
</style>
</head>
<body>
<div class="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <h1>Чем могу помочь?</h1>
      <p>Загрузите данные, рассчитайте погрешности, постройте график.</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Спроси о расчётах..." onkeypress="if(event.key==='Enter')send()">
      <button onclick="send()"><i class="fas fa-arrow-up"></i></button>
    </div>
  </div>
</div>
<script>
var el=document.getElementById('msgs');
var input=document.getElementById('input');
var hist=JSON.parse(localStorage.getItem('amenodes_chat')||'[]');
if(hist.length){document.getElementById('welcome').style.display='none';hist.forEach(function(m){add(m.role,m.text,false)});el.scrollTop=el.scrollHeight}
function add(role,text,scroll){
  var d=document.createElement('div');
  d.className='msg '+role;
  if(role==='bot'){
    d.innerHTML='<div class="content"><div class="avatar"><i class="fas fa-atom"></i></div><div><div class="text">'+render(text)+'</div><div class="time">'+time()+'</div></div></div>';
  }else{
    d.innerHTML='<div class="text">'+text+'</div><div class="time">'+time()+'</div>';
  }
  el.appendChild(d);
  if(scroll!==false)el.scrollTop=el.scrollHeight;
  hist.push({role:role,text:text,time:time()});
  localStorage.setItem('amenodes_chat',JSON.stringify(hist));
}
function render(t){
  try{return marked.parse(t)}catch(e){return t}
}
function time(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function send(){
  var t=input.value.trim();
  if(!t)return;
  document.getElementById('welcome').style.display='none';
  add('user',t);
  input.value='';
  var l=t.toLowerCase();
  if(l.includes('привет'))add('bot','Привет! Я AI-агент Amenodes. Помогу с расчётами, графиками и отчётами. Опишите задачу или загрузите данные.');
  else add('bot','Понял! Работаю над задачей...\n\nДля расчётов опишите данные или используйте команды:\n- `/calculate` — расчёт\n- `/plot` — график\n- `/report` — отчёт');
}
</script>
</body>
</html>
