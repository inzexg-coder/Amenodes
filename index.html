<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Amenodes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1a202c;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}

.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.header .brand{font-size:15px;font-weight:700;color:#5a67d8;letter-spacing:.5px}
.header .brand span{color:#805ad5}
.header .clear{background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px}
.header .clear:hover{background:#f3f4f6;color:#6b7280}

.chat{display:flex;flex-direction:column;height:calc(100dvh - 41px)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:720px;margin:0 auto;width:100%}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.user{background:#5a67d8;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.msg.bot{background:#f3f4f6;align-self:flex-start;border-bottom-left-radius:3px;display:flex;gap:8px;padding:10px}
.msg .ava{width:28px;height:28px;min-width:28px;border-radius:50%;background:#5a67d8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;margin-top:2px}
.msg .bd{flex:1;min-width:0}
.msg .time{font-size:10px;color:#9ca3af;margin-top:4px;text-align:right}
.msg.user .time{color:rgba(255,255,255,0.6)}
.msg.bot h1,.msg.bot h2,.msg.bot h3,.msg.bot h4{font-weight:600;margin:6px 0 2px;font-size:inherit}
.msg.bot code{padding:1px 4px;background:#e5e7eb;border-radius:3px;font-size:12px;font-family:monospace}
.msg.bot pre{margin:6px 0;padding:10px;background:#f9fafb;border-radius:6px;overflow-x:auto;border:1px solid #e5e7eb}
.msg.bot pre code{background:none;padding:0}
.msg.bot table{border-collapse:collapse;margin:6px 0;font-size:13px;width:100%}
.msg.bot table th,.msg.bot table td{padding:6px 10px;border:1px solid #d1d5db;text-align:left}
.msg.bot table th{background:#e5e7eb;font-weight:600}
.msg.bot ul,.msg.bot ol{margin:4px 0;padding-left:18px}
.msg.bot li{margin:2px 0}
.msg.bot p{margin:3px 0}
.msg.bot strong{font-weight:600;color:#111827}

.input-area{padding:8px 12px 12px;border-top:1px solid #e5e7eb;background:#fff}
.input-wrap{display:flex;gap:8px;max-width:720px;margin:0 auto}
.input-wrap input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid #d1d5db;background:#f9fafb;color:#111827;font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none}
.input-wrap input:focus{border-color:#5a67d8;background:#fff}
.input-wrap input::placeholder{color:#9ca3af}
.input-wrap button{width:40px;height:40px;border-radius:50%;background:#5a67d8;color:#fff;border:none;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.input-wrap button:active{background:#4c51bf}

.welcome{text-align:center;padding:80px 24px 40px}
.welcome h1{font-size:22px;font-weight:600;margin-bottom:8px}
.welcome p{font-size:13px;color:#6b7280}
</style>
</head>
<body>

<div class="header">
  <div class="brand">AMENO<span>DES</span></div>
  <button class="clear" onclick="clearChat()" title="Новый диалог"><i class="fas fa-plus"></i> Новый</button>
</div>

<div class="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <h1>Чем могу помочь?</h1>
      <p>AI-агент для научных данных. Расчёты, графики, отчёты.</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Спроси о расчётах..." autofocus onkeypress="if(event.key==='Enter')send()">
      <button onclick="send()"><i class="fas fa-arrow-up"></i></button>
    </div>
  </div>
</div>

<script>
var msgs=document.getElementById('msgs');
var input=document.getElementById('input');
var welcome=document.getElementById('welcome');

function load(){
  var raw=localStorage.getItem('amenodes_chat');
  if(!raw)return;
  try{
    var h=JSON.parse(raw);
    if(!h.length)return;
    welcome.style.display='none';
    h.forEach(function(m){msgs.appendChild(build(m.role,m.text,m.time))});
    msgs.scrollTop=msgs.scrollHeight;
  }catch(e){}
}

function save(role,text,time){
  var r=localStorage.getItem('amenodes_chat');
  var h=r?JSON.parse(r):[];
  h.push({role:role,text:text,time:time});
  localStorage.setItem('amenodes_chat',JSON.stringify(h));
}

function build(role,text,time){
  var d=document.createElement('div');
  d.className='msg '+role;
  if(role==='bot'){
    var rendered=render(text);
    d.innerHTML='<div class="ava"><i class="fas fa-atom"></i></div><div class="bd">'+rendered+'<div class="time">'+time+'</div></div>';
  }else{
    d.innerHTML='<div class="bd"><div>'+text+'</div><div class="time">'+time+'</div></div>';
  }
  return d;
}

function render(t){
  var html=t;
  try{html=marked.parse(t)}catch(e){}
  html=html.replace(/\$([^\$]+)\$/g,function(match,f){
    try{return katex.renderToString(f,{throwOnError:false,displayMode:false})}
    catch(e){return '<span style="color:#e53e3e">$'+f+'$</span>'}
  });
  html=html.replace(/\$\$([^\$]+)\$\$/g,function(match,f){
    try{return katex.renderToString(f,{throwOnError:false,displayMode:true})}
    catch(e){return '<span style="color:#e53e3e">$$'+f+'$$</span>'}
  });
  return html;
}

function add(role,text){
  welcome.style.display='none';
  var t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  msgs.appendChild(build(role,text,t));
  msgs.scrollTop=msgs.scrollHeight;
  save(role,text,t);
}

function send(){
  var t=input.value.trim();
  if(!t)return;
  add('user',t);
  input.value='';
  var l=t.toLowerCase();

  if(l.includes('привет')||l=='здравствуй'||l=='hello'){
    add('bot','Привет! Я AI-агент **Amenodes**.\n\nПомогу с расчётами, графиками и отчётами. Опишите задачу — я запущу вычисления в графовом редакторе.');
  }
  else if(l.includes('посчитай')||l.includes('рассчитай')||l.includes('вычисли')){
    add('bot','Для расчёта откройте **вкладку Граф** → создайте **DataNode** с данными → подключите **CalcNode**.\n\nИли введите значения прямо сейчас — построю формулу с погрешностями: $\\rho = \\frac{m}{V}$');
  }
  else if(l.includes('график')||l.includes('построй')||l.includes('визуал')){
    add('bot','Построю **scatter**, **line**, **histogram** с планками погрешностей.\n\nЗагрузите данные через **DataNode** в графе или напишите значения — построю график.');
  }
  else if(l.includes('отчёт')||l.includes('документ')||l.includes('pdf')){
    add('bot','Сгенерирую отчёт в **PDF** / **LaTeX** по вашему графу.\n\nНастройте **ReportNode** в редакторе → выберите шаблон → получите готовый документ.');
  }
  else if(l.includes('найди')||l.includes('поиск')||l.includes('найти')){
    add('bot','Поиск в графе — откройте редактор и используйте фильтры по типу ноды или значению.');
  }
  else if(l.includes('помощь')||l.includes('что умеешь')||l.includes('что можешь')){
    add('bot','Я умею:\n\n- **Рассчитывать** данные с погрешностями\n- **Строить графики** (scatter, line, histogram)\n- **Генерировать отчёты** в PDF/LaTeX\n- **Работать с формулами** $\\sigma = \\sqrt{\\sum \\Delta_i^2}$\n\nОпишите задачу — помогу!');
  }
  else if(l.includes('меня зовут')){
    var name=t.replace(/меня зовут /i,'').trim();
    add('bot','Приятно познакомиться, **'+name+'**! 👋\n\nЧем могу помочь с данными?');
  }
  else if(l.includes('спасибо')||l.includes('благодарю')){
    add('bot','Всегда пожалуйста! Если понадобится помощь — обращайтесь.');
  }
  else if(l.includes('формул')||l.includes('погрешн')){
    add('bot','Поддерживаю формулы: $\\rho = \\frac{m}{V}$, $\\sigma = \\sqrt{\\sum \\Delta_i^2}$\n\nДля отображения используй **$...$** (inline) или **$$...$$** (блок).');
  }
  else{
    add('bot','Понял! Работаю над: **«'+t+'»**\n\nДля полноценной работы с данными откройте **графовый редактор** — там можно загрузить данные, построить вычислительный пайплайн и получить результат.');
  }
}

function clearChat(){
  if(msgs.querySelectorAll('.msg').length===0)return;
  if(!confirm('Начать новый диалог? История будет очищена.'))return;
  localStorage.removeItem('amenodes_chat');
  msgs.querySelectorAll('.msg').forEach(function(m){m.remove()});
  welcome.style.display='';
  input.focus();
}

load();
</script>
</body>
</html>
