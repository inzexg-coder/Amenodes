<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="templates.title">Template Library</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/mobile.css">
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html" data-i18n="templates.editorLink">Editor</a>
        <a href="templates.html" class="active" data-i18n="templates.templatesLink">Templates</a>
        <a href="profile.html" data-i18n="templates.profileLink">Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="templates-container">
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="approved" data-i18n="templates.approvedTab">Approved Templates</button>
        <button class="filter-tab" data-filter="all" data-i18n="templates.allTab">All Templates</button>
    </div>

    <div class="search-section">
        <div class="search-input">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="templates.searchPlaceholder" placeholder="Search templates...">
        </div>
        <div class="filters">
            <select id="levelFilter" class="filter-select">
                <option value="" data-i18n="templates.allLevels">All Levels</option>
                <option value="regular" data-i18n="templates.levelRegular">Regular</option>
                <option value="featured" data-i18n="templates.levelFeatured">Featured</option>
                <option value="epic" data-i18n="templates.levelEpic">Epic</option>
                <option value="legendary" data-i18n="templates.levelLegendary">Legendary</option>
                <option value="godlike" data-i18n="templates.levelGodlike">Godlike</option>
            </select>
            <select id="sortFilter" class="filter-select">
                <option value="newest" data-i18n="templates.sortNewest">Newest First</option>
                <option value="top_cp" data-i18n="templates.sortTopCP">Most Creator Points</option>
                <option value="popular" data-i18n="templates.sortPopular">Most Popular</option>
            </select>
        </div>
    </div>

    <div id="templatesList" class="templates-list">
        <div class="loading"><i class="fas fa-spinner"></i> <span data-i18n="templates.loading">Loading templates...</span></div>
    </div>

    <div id="pagination" class="pagination"></div>
</div>

<script type="module">
    import { i18n, t } from './src/i18n/LanguageManager.js';
    
    function updateAllTexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key) el.textContent = t(key);
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (key) el.placeholder = t(key);
        });
        document.title = t('templates.title');
    }
    
    i18n.subscribe(() => updateAllTexts());
    updateAllTexts();
    
    const API_BASE = 'https://amenoke.ru/amenodes/api';
    let currentUser = null;
    let currentFilter = 'approved';
    let currentPage = 1;
    let currentQuery = '';
    let currentLevel = '';
    let currentSort = 'newest';
    
    function getToken() { return localStorage.getItem('auth_token'); }
    
    async function apiRequest(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        const token = getToken();
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }
    
    async function getCurrentUser() {
        const token = getToken();
        if (!token) return null;
        try { return await apiRequest('/me.php'); }
        catch { return null; }
    }
    
    async function searchTemplates() {
        const params = new URLSearchParams({ 
            q: currentQuery, level: currentLevel, sort: currentSort, 
            status: currentFilter, page: currentPage, limit: 20 
        });
        return apiRequest(`/search_templates.php?${params}`);
    }
    
    async function moderateTemplate(id, action, level) {
        return apiRequest('/moderate_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: id, action, level: level || 'regular' })
        });
    }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function getLevelClass(level) {
        const map = { 'regular': 'level-regular', 'featured': 'level-featured', 'epic': 'level-epic', 'legendary': 'level-legendary', 'godlike': 'level-godlike' };
        return map[level] || 'level-regular';
    }
    
    function getLevelName(level) { return t(`templates.level${level.charAt(0).toUpperCase() + level.slice(1)}`); }
    function getStatusName(status) { return t(`templates.status${status.charAt(0).toUpperCase() + status.slice(1)}`); }
    function getStatusClass(status) { return `status-${status}`; }
    
    async function loadTemplates() {
        const container = document.getElementById('templatesList');
        container.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> ${t('templates.loading')}</div>`;
        try {
            const data = await searchTemplates();
            if (!data.templates || data.templates.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-cubes"></i> ${t('templates.noTemplates')}<div style="font-size:12px;margin-top:8px;">${t('templates.adjustSearch')}</div></div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            const isModerator = currentUser && (currentUser.role === 'moderator' || currentUser.role === 'admin');
            container.innerHTML = data.templates.map(tpl => {
                const isApproved = tpl.status === 'approved';
                const isPending = tpl.status === 'pending';
                const isRejected = tpl.status === 'rejected';
                const levelClass = isApproved ? getLevelClass(tpl.verification_level) : '';
                return `
                    <div class="template-card ${levelClass}">
                        <div class="template-content">
                            <div class="template-info">
                                <div class="template-title">
                                    <span>${escapeHtml(tpl.title)}</span>
                                    ${!isApproved ? `<span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>` : ''}
                                </div>
                                <div class="template-desc">${escapeHtml(tpl.description || t('common.noDescription'))}</div>
                                <div class="template-meta">
                                    <span><i class="fas fa-user"></i> ${escapeHtml(tpl.username)}</span>
                                    <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                                    ${tpl.creator_points_awarded > 0 ? `<span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} ${t('templates.cpAwarded')}</span>` : ''}
                                </div>
                            </div>
                            <button class="btn btn-secondary" onclick="window.location.href='amenodes.html?template=${tpl.id}'">${t('templates.openTemplate')}</button>
                        </div>
                        ${isModerator && isPending ? `
                            <div class="template-actions">
                                <select id="level-${tpl.id}" class="mod-select">
                                    <option value="regular">${t('templates.regularCP')}</option>
                                    <option value="featured">${t('templates.featuredCP')}</option>
                                    <option value="epic">${t('templates.epicCP')}</option>
                                    <option value="legendary">${t('templates.legendaryCP')}</option>
                                    <option value="godlike">${t('templates.godlikeCP')}</option>
                                </select>
                                <button class="mod-btn mod-approve" onclick="window.approveTemplate(${tpl.id})">${t('templates.approve')}</button>
                                <button class="mod-btn mod-reject" onclick="window.rejectTemplate(${tpl.id})">${t('templates.reject')}</button>
                            </div>
                        ` : ''}
                        ${isModerator && isApproved ? `
                            <div class="template-actions">
                                <button class="mod-btn mod-revert" onclick="window.rejectTemplate(${tpl.id})">${t('templates.revertToPending')}</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            const pages = data.pagination.pages;
            if (pages > 1) {
                let html = '';
                for (let i = 1; i <= Math.min(pages, 10); i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                document.getElementById('pagination').innerHTML = html;
                document.querySelectorAll('.page-btn').forEach(btn => btn.onclick = () => { currentPage = parseInt(btn.dataset.page); loadTemplates(); window.scrollTo({ top: 0 }); });
            } else { document.getElementById('pagination').innerHTML = ''; }
        } catch (err) { container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> ${t('common.error')}<br><small>${err.message}</small></div>`; }
    }
    
    window.approveTemplate = async (id) => {
        const level = document.getElementById(`level-${id}`)?.value || 'regular';
        try { await moderateTemplate(id, 'approve', level); showToast(t('templates.templateApproved'), 'success'); loadTemplates(); } 
        catch (err) { showToast(err.message, 'error'); }
    };
    
    window.rejectTemplate = async (id) => {
        try { await moderateTemplate(id, 'reject'); showToast(t('templates.templateRejected'), 'success'); loadTemplates(); } 
        catch (err) { showToast(err.message, 'error'); }
    };
    
    document.getElementById('searchInput').addEventListener('input', (e) => { currentQuery = e.target.value; currentPage = 1; loadTemplates(); });
    document.getElementById('levelFilter').addEventListener('change', (e) => { currentLevel = e.target.value; currentPage = 1; loadTemplates(); });
    document.getElementById('sortFilter').addEventListener('change', (e) => { currentSort = e.target.value; currentPage = 1; loadTemplates(); });
    
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            currentPage = 1;
            loadTemplates();
        };
    });
    
    function updateAuthUI() {
        const authSection = document.getElementById('authSection');
        if (currentUser) {
            authSection.innerHTML = `<div class="user-panel"><span class="user-name">${escapeHtml(currentUser.username)}</span>${currentUser.role === 'moderator' || currentUser.role === 'admin' ? '<span class="mod-badge">Mod</span>' : ''}<span class="user-points">${currentUser.creator_points} CP</span><button id="logoutBtn" style="background:none;border:none;color:#ffb347;cursor:pointer;">${t('templates.logout')}</button></div>`;
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('auth_token'); window.location.reload(); };
        } else {
            authSection.innerHTML = `<a href="amenodes.html" style="background:#ffb347;color:#1a1f30;padding:6px 16px;border-radius:30px;text-decoration:none;">${t('templates.login')}</a>`;
        }
    }
    
    (async () => {
        const data = await getCurrentUser();
        if (data?.success) currentUser = data.user;
        updateAuthUI();
        loadTemplates();
    })();
</script>
<!-- Bottom Navigation (mobile) -->
<nav class="mobile-bottom-nav">
  <a href="amenodes.html"><i class="fas fa-project-diagram"></i><span data-i18n="templates.editorLink">Editor</span></a>
  <a href="templates.html" class="active"><i class="fas fa-cube"></i><span data-i18n="templates.templatesLink">Templates</span></a>
  <a href="profile.html"><i class="fas fa-user"></i><span data-i18n="templates.profileLink">Profile</span></a>
</nav>
</body>
</html>
