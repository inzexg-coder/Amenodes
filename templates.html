<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Library</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0c14 0%, #121624 100%);
            min-height: 100vh;
            color: #eef2ff;
        }

        .header {
            background: #0f1222cc;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2e385c;
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ffb347;
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #aabbdd;
            text-decoration: none;
            transition: color 0.2s;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #ffb347;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1f30;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .user-name {
            color: #ffd700;
            font-weight: bold;
            font-size: 13px;
        }

        .mod-badge {
            background: #ff4444;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #2e385c;
            padding-bottom: 12px;
        }

        .filter-tab {
            background: none;
            border: none;
            color: #8899bb;
            padding: 8px 28px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: #ffb347;
            color: #1a1f30;
        }

        .filter-tab:hover:not(.active) {
            background: #2d3a5e;
            color: #fff;
        }

        .search-section {
            background: #0f1222cc;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #2e385c;
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1f30;
            border-radius: 40px;
            padding: 10px 20px;
        }

        .search-input i {
            color: #ffb347;
        }

        .search-input input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            background: #1a1f30;
            border: 1px solid #2e385c;
            border-radius: 30px;
            padding: 8px 16px;
            color: #fff;
            font-family: inherit;
            cursor: pointer;
            font-size: 13px;
        }

        .template-card {
            background: #0f1222;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            border: 1px solid #2e385c;
        }

        .template-card.regular {
            border-color: #4a4a5a;
            box-shadow: 0 0 8px rgba(100, 100, 120, 0.15);
        }
        .template-card.regular:hover {
            box-shadow: 0 0 15px rgba(100, 100, 120, 0.3);
            border-color: #6a6a7a;
        }

        .template-card.featured {
            border-color: #ffaa33;
            box-shadow: 0 0 10px rgba(255, 170, 51, 0.2);
            animation: gentleGlowYellow 3s ease-in-out infinite;
        }
        @keyframes gentleGlowYellow {
            0% { box-shadow: 0 0 5px rgba(255, 170, 51, 0.15); border-color: #ffaa33; }
            50% { box-shadow: 0 0 18px rgba(255, 200, 80, 0.35); border-color: #ffcc55; }
            100% { box-shadow: 0 0 5px rgba(255, 170, 51, 0.15); border-color: #ffaa33; }
        }

        .template-card.epic {
            border-color: #ff55bb;
            box-shadow: 0 0 10px rgba(255, 85, 187, 0.2);
            animation: gentleGlowPink 3s ease-in-out infinite;
        }
        @keyframes gentleGlowPink {
            0% { box-shadow: 0 0 5px rgba(255, 85, 187, 0.15); border-color: #ff55bb; }
            50% { box-shadow: 0 0 18px rgba(255, 120, 200, 0.35); border-color: #ff77cc; }
            100% { box-shadow: 0 0 5px rgba(255, 85, 187, 0.15); border-color: #ff55bb; }
        }

        .template-card.legendary {
            border-color: #33aaff;
            box-shadow: 0 0 10px rgba(51, 170, 255, 0.2);
            animation: gentleGlowBlue 3s ease-in-out infinite;
        }
        @keyframes gentleGlowBlue {
            0% { box-shadow: 0 0 5px rgba(51, 170, 255, 0.15); border-color: #33aaff; }
            50% { box-shadow: 0 0 18px rgba(80, 180, 255, 0.35); border-color: #55bbff; }
            100% { box-shadow: 0 0 5px rgba(51, 170, 255, 0.15); border-color: #33aaff; }
        }

        .template-card.godlike {
            border-color: #6a1b9a;
            border-width: 2px;
            box-shadow: 0 0 10px rgba(106, 27, 154, 0.3);
            animation: gentleGlowPurple 3s ease-in-out infinite;
        }
        @keyframes gentleGlowPurple {
            0% { box-shadow: 0 0 5px rgba(106, 27, 154, 0.2); border-color: #6a1b9a; }
            50% { box-shadow: 0 0 18px rgba(156, 39, 176, 0.4); border-color: #9c27b0; }
            100% { box-shadow: 0 0 5px rgba(106, 27, 154, 0.2); border-color: #6a1b9a; }
        }

        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .card-info {
            flex: 2;
            min-width: 200px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .card-desc {
            font-size: 13px;
            color: #8899bb;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #667799;
            flex-wrap: wrap;
        }

        .card-author {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-btn {
            background: #2d3a5e;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .view-btn:hover {
            background: #3f4e7a;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-pending { background: #ff8c00; color: #1a1f30; }
        .status-approved { display: none; }
        .status-rejected { background: #c62828; color: #ffcdd2; }

        .mod-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 16px 24px;
            background: #0a0c14;
            border-top: 1px solid #2e385c;
            flex-wrap: wrap;
        }

        .mod-select {
            background: #1a1f30;
            border: 1px solid #2e385c;
            border-radius: 30px;
            padding: 8px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .mod-btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mod-approve {
            background: #2e7d32;
            color: #fff;
        }
        .mod-approve:hover { background: #3e9142; }

        .mod-reject {
            background: #c62828;
            color: #fff;
        }
        .mod-reject:hover { background: #d83a3a; }

        .mod-revert {
            background: #ff8c00;
            color: #1a1f30;
        }
        .mod-revert:hover { background: #ffa033; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: #1a1f30;
            border: 1px solid #2e385c;
            padding: 8px 14px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn.active {
            background: #ffb347;
            border-color: #ffb347;
            color: #1a1f30;
        }

        .page-btn:hover:not(.active) {
            background: #2d3a5e;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 60px;
            color: #8899bb;
        }

        .loading i, .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f30;
            border-left: 4px solid #ffb347;
            color: #eef2ff;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            font-family: inherit;
            font-size: 13px;
        }

        .toast-success { border-left-color: #2e7d32; background: #1a2a1a; }
        .toast-error { border-left-color: #c62828; background: #2a1a1a; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .card-content { flex-direction: column; align-items: flex-start; }
            .mod-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html">Editor</a>
        <a href="templates.html">Templates</a>
        <a href="profile.html">Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="container">
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="approved">Approved Templates</button>
        <button class="filter-tab" data-filter="all">All Templates</button>
    </div>

    <div class="search-section">
        <div class="search-input">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search templates by name, description, or author...">
        </div>
        <div class="filters">
            <select id="levelFilter" class="filter-select">
                <option value="">All Levels</option>
                <option value="regular">Regular</option>
                <option value="featured">Featured</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
                <option value="godlike">Godlike</option>
            </select>
            <select id="sortFilter" class="filter-select">
                <option value="newest">Newest First</option>
                <option value="top_cp">Most Creator Points</option>
            </select>
        </div>
    </div>

    <div id="templatesList" class="templates-list">
        <div class="loading"><i class="fas fa-spinner"></i> Loading templates...</div>
    </div>

    <div id="pagination" class="pagination"></div>
</div>

<script>
const API_BASE = 'https://amenoke.ru/api';

class API {
    constructor() {
        this.token = localStorage.getItem('auth_token');
    }

    setToken(token) {
        this.token = token;
        if (token) localStorage.setItem('auth_token', token);
        else localStorage.removeItem('auth_token');
    }

    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
        
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async getCurrentUser() {
        if (!this.token) return null;
        try { return await this.request('/me.php'); }
        catch { return null; }
    }

    async searchTemplates(query, level, sort, status, page = 1) {
        const params = new URLSearchParams({ q: query, level, sort, status, page, limit: 20 });
        return this.request(`/search_templates.php?${params}`);
    }

    async moderateTemplate(templateId, action, level) {
        return this.request('/moderate_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: templateId, action, level })
        });
    }
}

const api = new API();
let currentUser = null;
let currentFilter = 'approved';
let currentPage = 1;
let currentQuery = '';
let currentLevel = '';
let currentSort = 'newest';

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getStatusClass(status) {
    const map = {
        'pending': 'status-pending',
        'approved': 'status-approved',
        'rejected': 'status-rejected'
    };
    return map[status] || 'status-pending';
}

function getStatusName(status) {
    const map = {
        'pending': 'Pending',
        'approved': 'Approved',
        'rejected': 'Rejected'
    };
    return map[status] || status;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getCardLevelClass(level, status) {
    if (status !== 'approved') return '';
    const map = {
        'regular': 'regular',
        'featured': 'featured',
        'epic': 'epic',
        'legendary': 'legendary',
        'godlike': 'godlike'
    };
    return map[level] || '';
}

async function moderateTemplate(id, action, level = null) {
    try {
        await api.moderateTemplate(id, action, level);
        const actionText = action === 'approve' ? 'approved' : action === 'reject' ? 'rejected' : 'updated';
        showToast(`Template ${actionText}`, 'success');
        loadTemplates();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

async function loadTemplates() {
    const container = document.getElementById('templatesList');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading templates...</div>';
    
    try {
        const data = await api.searchTemplates(currentQuery, currentLevel, currentSort, currentFilter, currentPage);
        
        if (!data.templates || data.templates.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-cubes"></i>
                    No templates found
                    <div style="font-size: 12px; margin-top: 8px;">Try adjusting your search or filters</div>
                </div>
            `;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        const isModerator = currentUser && (currentUser.role === 'moderator' || currentUser.role === 'admin');
        
        container.innerHTML = data.templates.map(tpl => {
            const levelClass = getCardLevelClass(tpl.verification_level, tpl.status);
            const isApproved = tpl.status === 'approved';
            const isPending = tpl.status === 'pending';
            const isRejected = tpl.status === 'rejected';
            
            return `
                <div class="template-card ${levelClass}">
                    <div class="card-content">
                        <div class="card-info">
                            <div class="card-title">
                                <span>${escapeHtml(tpl.title)}</span>
                                ${!isApproved ? `<span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>` : ''}
                            </div>
                            <div class="card-desc">${escapeHtml(tpl.description || 'No description')}</div>
                            <div class="card-meta">
                                <span class="card-author"><i class="fas fa-user"></i> ${escapeHtml(tpl.username)}</span>
                                <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div class="card-stats">
                            <button class="view-btn" onclick="window.location.href='amenodes.html?template=${tpl.id}'">Open Template</button>
                        </div>
                    </div>
                    ${isModerator ? `
                        <div class="mod-actions">
                            <select id="level-${tpl.id}" class="mod-select">
                                <option value="regular" ${tpl.verification_level === 'regular' ? 'selected' : ''}>Regular (1 CP)</option>
                                <option value="featured" ${tpl.verification_level === 'featured' ? 'selected' : ''}>Featured (2 CP)</option>
                                <option value="epic" ${tpl.verification_level === 'epic' ? 'selected' : ''}>Epic (3 CP)</option>
                                <option value="legendary" ${tpl.verification_level === 'legendary' ? 'selected' : ''}>Legendary (4 CP)</option>
                                <option value="godlike" ${tpl.verification_level === 'godlike' ? 'selected' : ''}>Godlike (5 CP)</option>
                            </select>
                            ${isPending ? `
                                <button class="mod-btn mod-approve" onclick="moderateTemplate(${tpl.id}, 'approve', document.getElementById('level-${tpl.id}').value)">Approve</button>
                                <button class="mod-btn mod-reject" onclick="moderateTemplate(${tpl.id}, 'reject')">Reject</button>
                            ` : isApproved ? `
                                <button class="mod-btn mod-approve" onclick="moderateTemplate(${tpl.id}, 'approve', document.getElementById('level-${tpl.id}').value)">Update Level</button>
                                <button class="mod-btn mod-revert" onclick="moderateTemplate(${tpl.id}, 'reject')">Revert to Pending</button>
                            ` : isRejected ? `
                                <button class="mod-btn mod-approve" onclick="moderateTemplate(${tpl.id}, 'approve', document.getElementById('level-${tpl.id}').value)">Approve</button>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
        
        const pagination = document.getElementById('pagination');
        const totalPages = data.pagination.pages;
        if (totalPages > 1) {
            let pagesHtml = '';
            for (let i = 1; i <= Math.min(totalPages, 10); i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            pagination.innerHTML = pagesHtml;
            pagination.querySelectorAll('.page-btn').forEach(btn => {
                btn.onclick = () => {
                    currentPage = parseInt(btn.dataset.page);
                    loadTemplates();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
            });
        } else {
            pagination.innerHTML = '';
        }
    } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Failed to load templates<br><small>${err.message}</small></div>`;
    }
}

function updateAuthUI() {
    const authSection = document.getElementById('authSection');
    if (!authSection) return;
    
    if (currentUser) {
        authSection.innerHTML = `
            <div class="user-panel">
                <span class="user-name">${currentUser.username}</span>
                ${currentUser.role === 'moderator' || currentUser.role === 'admin' ? '<span class="mod-badge">Mod</span>' : ''}
                <span class="user-points">${currentUser.creator_points} CP</span>
                <button id="logoutBtn" style="background: none; border: none; color: #ffb347; cursor: pointer; margin-left: 8px;">Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => {
            api.logout();
            window.location.reload();
        };
    } else {
        authSection.innerHTML = '<a href="amenodes.html" style="background:#ffb347; color:#1a1f30; padding:6px 16px; border-radius:30px; text-decoration:none;">Login</a>';
    }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    currentQuery = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.getElementById('levelFilter').addEventListener('change', (e) => {
    currentLevel = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.getElementById('sortFilter').addEventListener('change', (e) => {
    currentSort = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        currentPage = 1;
        loadTemplates();
    };
});

window.moderateTemplate = moderateTemplate;

async function init() {
    try {
        const data = await api.getCurrentUser();
        if (data && data.success) {
            currentUser = data.user;
            updateAuthUI();
        } else {
            updateAuthUI();
        }
        loadTemplates();
    } catch (err) {
        console.error(err);
        updateAuthUI();
        loadTemplates();
    }
}

init();
</script>
</body>
</html>
