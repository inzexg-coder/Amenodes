<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Library</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: linear-gradient(135deg, #0a0c14 0%, #121624 100%);
            min-height: 100vh;
            color: #eef2ff;
        }

        .header {
            background: #0f1222cc;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2e385c;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ffb347;
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #aabbdd;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #ffb347;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2a2a3a;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .user-name {
            color: #ffd700;
            font-weight: bold;
        }

        .mod-badge {
            background: #ff4444;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #2e385c;
            padding-bottom: 12px;
        }

        .filter-tab {
            background: none;
            border: none;
            color: #8899bb;
            padding: 8px 24px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: #ffb347;
            color: #1a1f30;
        }

        .filter-tab:hover:not(.active) {
            background: #2d3a5e;
            color: #fff;
        }

        .search-section {
            background: #0f1222cc;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #2e385c;
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1f30;
            border-radius: 40px;
            padding: 10px 20px;
        }

        .search-input i {
            color: #ffb347;
        }

        .search-input input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            background: #1a1f30;
            border: 1px solid #2e385c;
            border-radius: 30px;
            padding: 8px 16px;
            color: #fff;
            font-family: monospace;
            cursor: pointer;
        }

        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .level-regular { background: #555; color: #ccc; }
        .level-featured { background: #ffd700; color: #1a1f30; }
        .level-epic { background: #ff69b4; color: #1a1f30; }
        .level-legendary { background: #00bfff; color: #1a1f30; }
        .level-godlike { background: linear-gradient(135deg, #9b59b6, #ff69b4); color: #fff; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-pending { background: #ff8c00; color: #1a1f30; }
        .status-approved { background: #2e7d32; color: #fff; }
        .status-rejected { background: #c62828; color: #fff; }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .template-card {
            background: #0f1222;
            border-radius: 16px;
            border: 1px solid #2e385c;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .template-card:hover {
            transform: translateY(-4px);
            border-color: #ffb347;
            box-shadow: 0 8px 24px rgba(255, 179, 71, 0.15);
        }

        .card-header {
            padding: 16px;
            border-bottom: 1px solid #2e385c;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-desc {
            font-size: 12px;
            color: #8899bb;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #667799;
        }

        .card-author {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-footer {
            padding: 12px 16px;
            background: #0a0c14;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .points {
            color: #ffd700;
            font-weight: bold;
        }

        .view-btn {
            background: #2d3a5e;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }

        .view-btn:hover {
            background: #3f4e7a;
        }

        .mod-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2e385c;
        }

        .mod-btn {
            flex: 1;
            padding: 6px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
        }

        .mod-approve {
            background: #2e7d32;
            color: #fff;
        }

        .mod-reject {
            background: #c62828;
            color: #fff;
        }

        .level-select-small {
            background: #1a1f30;
            border: 1px solid #2e385c;
            border-radius: 8px;
            padding: 4px 8px;
            color: #fff;
            font-size: 10px;
            font-family: monospace;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: #1a1f30;
            border: 1px solid #2e385c;
            padding: 8px 14px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .page-btn.active {
            background: #ffb347;
            border-color: #ffb347;
            color: #1a1f30;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #8899bb;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #667799;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .toast-success { background: #2e7d32; }
        .toast-error { background: #c62828; }
        .toast-info { background: #1565c0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .auth-modal-content {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
            color: #fff;
        }

        .auth-modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .templates-grid { grid-template-columns: 1fr; }
            .search-section { flex-direction: column; border-radius: 20px; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html"><i class="fas fa-edit"></i> Editor</a>
        <a href="templates.html"><i class="fas fa-cubes"></i> Templates</a>
        <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="container">
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="approved">✓ Approved Templates</button>
        <button class="filter-tab" data-filter="all">📋 All Templates</button>
    </div>

    <div class="search-section">
        <div class="search-input">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search templates by name, description, or author...">
        </div>
        <div class="filters">
            <select id="levelFilter" class="filter-select">
                <option value="">All Levels</option>
                <option value="regular">Regular</option>
                <option value="featured">Featured</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
                <option value="godlike">Godlike</option>
            </select>
            <select id="sortFilter" class="filter-select">
                <option value="newest">Newest</option>
                <option value="top_cp">Most CP</option>
                <option value="popular">Most Popular</option>
            </select>
        </div>
    </div>

    <div id="templatesGrid" class="templates-grid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>
    </div>

    <div id="pagination" class="pagination"></div>
</div>

<script>
const API_BASE = 'https://amenoke.ru/api';

class API {
    constructor() {
        this.token = localStorage.getItem('auth_token');
    }

    setToken(token) {
        this.token = token;
        if (token) localStorage.setItem('auth_token', token);
        else localStorage.removeItem('auth_token');
    }

    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
        
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async getCurrentUser() {
        if (!this.token) return null;
        try { return await this.request('/me.php'); }
        catch { return null; }
    }

    async searchTemplates(query, level, sort, status, page = 1) {
        const params = new URLSearchParams({ q: query, level, sort, status, page, limit: 12 });
        return this.request(`/search_templates.php?${params}`);
    }

    async moderateTemplate(templateId, action, level) {
        return this.request('/moderate_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: templateId, action, level })
        });
    }
}

const api = new API();
let currentUser = null;
let currentFilter = 'approved';
let currentPage = 1;
let currentQuery = '';
let currentLevel = '';
let currentSort = 'newest';

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getLevelClass(level) {
    const map = {
        'regular': 'level-regular',
        'featured': 'level-featured',
        'epic': 'level-epic',
        'legendary': 'level-legendary',
        'godlike': 'level-godlike'
    };
    return map[level] || 'level-regular';
}

function getLevelName(level) {
    const map = {
        'regular': 'Regular',
        'featured': 'Featured',
        'epic': 'Epic',
        'legendary': 'Legendary',
        'godlike': 'Godlike'
    };
    return map[level] || 'Regular';
}

function getStatusClass(status) {
    const map = {
        'pending': 'status-pending',
        'approved': 'status-approved',
        'rejected': 'status-rejected'
    };
    return map[status] || 'status-pending';
}

function getStatusName(status) {
    const map = {
        'pending': 'Pending',
        'approved': 'Approved',
        'rejected': 'Rejected'
    };
    return map[status] || status;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

async function approveTemplate(id, level) {
    if (!confirm(`Approve this template as ${getLevelName(level)}?`)) return;
    
    try {
        await api.moderateTemplate(id, 'approve', level);
        showToast(`Template approved!`, 'success');
        loadTemplates();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

async function rejectTemplate(id) {
    if (!confirm('Reject this template?')) return;
    
    try {
        await api.moderateTemplate(id, 'reject', null);
        showToast('Template rejected', 'success');
        loadTemplates();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

async function loadTemplates() {
    const grid = document.getElementById('templatesGrid');
    grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>';
    
    try {
        const data = await api.searchTemplates(currentQuery, currentLevel, currentSort, currentFilter, currentPage);
        
        if (!data.templates || data.templates.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-cubes"></i>
                    <p>No templates found</p>
                    <small>Try adjusting your search or filters</small>
                </div>
            `;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        const isModerator = currentUser && (currentUser.role === 'moderator' || currentUser.role === 'admin');
        
        grid.innerHTML = data.templates.map(tpl => `
            <div class="template-card" onclick="if(!event.target.closest('.mod-actions')) window.location.href='amenodes.html?template=${tpl.id}'">
                <div class="card-header">
                    <div class="card-title">
                        <span>${escapeHtml(tpl.title)}</span>
                        <div style="display: flex; gap: 8px;">
                            ${tpl.verification_level ? `<span class="level-badge ${getLevelClass(tpl.verification_level)}">${getLevelName(tpl.verification_level)}</span>` : ''}
                            <span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>
                        </div>
                    </div>
                    <div class="card-desc">${escapeHtml(tpl.description || 'No description')}</div>
                    <div class="card-meta">
                        <span class="card-author"><i class="fas fa-user"></i> ${escapeHtml(tpl.username)}</span>
                        <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                    </div>
                    ${tpl.creator_points_awarded > 0 ? `<div class="card-meta" style="margin-top: 8px;"><span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} CP awarded</span></div>` : ''}
                </div>
                <div class="card-footer">
                    <span class="points"><i class="fas fa-star"></i> ${tpl.creator_points_awarded || 0} CP</span>
                    <button class="view-btn" onclick="event.stopPropagation(); window.location.href='amenodes.html?template=${tpl.id}'">Open →</button>
                </div>
                ${isModerator && tpl.status === 'pending' ? `
                    <div class="mod-actions">
                        <select id="level-${tpl.id}" class="level-select-small">
                            <option value="regular">Regular (1 CP)</option>
                            <option value="featured">Featured (2 CP)</option>
                            <option value="epic">Epic (3 CP)</option>
                            <option value="legendary">Legendary (4 CP)</option>
                            <option value="godlike">Godlike (5 CP)</option>
                        </select>
                        <button class="mod-btn mod-approve" onclick="event.stopPropagation(); approveTemplate(${tpl.id}, document.getElementById('level-${tpl.id}').value)">Approve</button>
                        <button class="mod-btn mod-reject" onclick="event.stopPropagation(); rejectTemplate(${tpl.id})">Reject</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
        
        const pagination = document.getElementById('pagination');
        const totalPages = data.pagination.pages;
        if (totalPages > 1) {
            let pagesHtml = '';
            for (let i = 1; i <= Math.min(totalPages, 10); i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            pagination.innerHTML = pagesHtml;
            pagination.querySelectorAll('.page-btn').forEach(btn => {
                btn.onclick = () => {
                    currentPage = parseInt(btn.dataset.page);
                    loadTemplates();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
            });
        } else {
            pagination.innerHTML = '';
        }
    } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load templates</p><small>${err.message}</small></div>`;
    }
}

function updateAuthUI() {
    const authSection = document.getElementById('authSection');
    if (!authSection) return;
    
    if (currentUser) {
        authSection.innerHTML = `
            <div class="user-panel">
                <span class="user-name">${currentUser.username}</span>
                ${currentUser.role === 'moderator' || currentUser.role === 'admin' ? '<span class="mod-badge">Mod</span>' : ''}
                <span class="user-points">⭐ ${currentUser.creator_points} CP</span>
                <button id="logoutBtn" style="background: none; border: none; color: #ffb347; cursor: pointer; margin-left: 8px;">Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => {
            api.logout();
            window.location.reload();
        };
    } else {
        authSection.innerHTML = '<a href="amenodes.html" style="background:#ffb347; color:#1a1f30; padding:6px 16px; border-radius:30px; text-decoration:none;">Login</a>';
    }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    currentQuery = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.getElementById('levelFilter').addEventListener('change', (e) => {
    currentLevel = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.getElementById('sortFilter').addEventListener('change', (e) => {
    currentSort = e.target.value;
    currentPage = 1;
    loadTemplates();
});

document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        currentPage = 1;
        loadTemplates();
    };
});

window.approveTemplate = approveTemplate;
window.rejectTemplate = rejectTemplate;
    
async function init() {
    try {
        const data = await api.getCurrentUser();
        if (data && data.success) {
            currentUser = data.user;
            updateAuthUI();
        } else {
            updateAuthUI();
        }
        loadTemplates();
    } catch (err) {
        console.error(err);
        updateAuthUI();
        loadTemplates();
    }
}

init();
</script>
</body>
</html>
