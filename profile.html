<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0c14 0%, #121624 100%);
            min-height: 100vh;
            color: #eef2ff;
        }

        .header {
            background: #0f1222cc;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2e385c;
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ffb347;
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #aabbdd;
            text-decoration: none;
            transition: color 0.2s;
            font-size: 14px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffb347;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1f30;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .user-name {
            color: #ffd700;
            font-weight: bold;
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .profile-wing-card {
            background: #0f1222;
            border-radius: 48px;
            padding: 40px 24px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid #2e385c;
            transition: all 0.3s ease;
        }

        .wing-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .wing-left, .wing-right {
            font-size: 48px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .wing-left i, .wing-right i {
            transition: all 0.3s ease;
        }

        .cp-center {
            text-align: center;
            min-width: 200px;
        }

        .cp-number {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .cp-label {
            font-size: 14px;
            color: #8899bb;
            margin-top: 8px;
        }

        .username-badge {
            margin-top: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .wings-tier-1 .wing-left i, .wings-tier-1 .wing-right i {
            font-size: 32px;
            opacity: 0.6;
            filter: drop-shadow(0 0 2px currentColor);
        }
        .wings-tier-2 .wing-left i, .wings-tier-2 .wing-right i {
            font-size: 42px;
            opacity: 0.8;
            filter: drop-shadow(0 0 4px currentColor);
        }
        .wings-tier-3 .wing-left i, .wings-tier-3 .wing-right i {
            font-size: 52px;
            opacity: 1;
            filter: drop-shadow(0 0 8px currentColor);
            animation: gentleWingGlow 3s infinite;
        }
        .wings-tier-4 .wing-left i, .wings-tier-4 .wing-right i {
            font-size: 64px;
            opacity: 1;
            filter: drop-shadow(0 0 15px currentColor);
            animation: wingPulse 2s infinite;
        }
        .wings-tier-5 .wing-left i, .wings-tier-5 .wing-right i {
            font-size: 80px;
            opacity: 1;
            filter: drop-shadow(0 0 25px currentColor);
            animation: wingFlap 1.5s infinite alternate;
        }
        @keyframes gentleWingGlow {
            0% { filter: drop-shadow(0 0 4px currentColor); }
            50% { filter: drop-shadow(0 0 12px currentColor); }
            100% { filter: drop-shadow(0 0 4px currentColor); }
        }
        @keyframes wingPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px currentColor); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px currentColor); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px currentColor); }
        }
        @keyframes wingFlap {
            0% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 15px currentColor); }
            100% { transform: scale(1.1) rotate(3deg); filter: drop-shadow(0 0 30px currentColor); }
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #2e385c;
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #8899bb;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #ffb347;
            border-bottom: 2px solid #ffb347;
        }

        .templates-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .template-card {
            background: #0f1222;
            border-radius: 16px;
            border: 1px solid #2e385c;
            overflow: hidden;
            transition: all 0.2s;
        }

        .template-card:hover {
            border-color: #ffb347;
            background: #121624;
        }

        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .card-info {
            flex: 2;
            min-width: 200px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .card-desc {
            font-size: 13px;
            color: #8899bb;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #667799;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-pending { background: #ff8c00; color: #1a1f30; }
        .status-approved { background: #2e7d32; color: #fff; }
        .status-rejected { background: #c62828; color: #ffcdd2; }

        .card-footer {
            padding: 12px 24px;
            background: #0a0c14;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid #2e385c;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-secondary {
            background: #2d3a5e;
            color: #fff;
        }
        .btn-secondary:hover { background: #3f4e7a; }

        .btn-danger {
            background: #8b3a3a;
            color: #ffcccc;
        }
        .btn-danger:hover { background: #aa4a4a; }

        .empty-state, .loading {
            text-align: center;
            padding: 60px;
            color: #8899bb;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f30;
            border-left: 4px solid #ffb347;
            color: #eef2ff;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            font-family: inherit;
            font-size: 13px;
        }
        .toast-success { border-left-color: #2e7d32; background: #1a2a1a; }
        .toast-error { border-left-color: #c62828; background: #2a1a1a; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .wing-left i, .wing-right i { font-size: 36px !important; }
            .cp-number { font-size: 36px; }
            .card-content { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html">Editor</a>
        <a href="templates.html">Templates</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="container" id="container">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading profile...</div>
</div>

<script>
const API_BASE = 'https://amenoke.ru/api';

class API {
    constructor() {
        this.token = localStorage.getItem('auth_token');
    }

    setToken(token) {
        this.token = token;
        if (token) localStorage.setItem('auth_token', token);
        else localStorage.removeItem('auth_token');
    }

    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
        
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async getCurrentUser() {
        if (!this.token) return null;
        try { return await this.request('/me.php'); }
        catch { return null; }
    }

    async getUserTemplates(userId, status = 'all') {
        return this.request(`/user_templates.php?user_id=${userId}&status=${status}`);
    }

    async deleteTemplate(templateId) {
        return this.request('/delete_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: templateId })
        });
    }
}

const api = new API();
let currentUser = null;
let currentTab = 'all';

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getStatusClass(status) {
    const map = { 'pending': 'status-pending', 'approved': 'status-approved', 'rejected': 'status-rejected' };
    return map[status] || 'status-pending';
}

function getStatusName(status) {
    const map = { 'pending': 'Pending', 'approved': 'Approved', 'rejected': 'Rejected' };
    return map[status] || status;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getWingColor(cp) {
    let stars = cp / 10;
    if (stars >= 8.1) return '#c97eff';
    const colors = [
        '#5a9cff', '#6aaaff', '#7ab8ff', '#8ac6ff', '#9ad4ff',
        '#aae2aa', '#e8c84a', '#f0a03a', '#e8702a', '#d04020',
        '#c02050', '#b03080', '#a040b0', '#8050c0', '#5060d0',
        '#3040a0', '#102070'
    ];
    let idx = Math.floor(stars * 2);
    idx = Math.min(colors.length - 1, Math.max(0, idx));
    return colors[idx];
}

function getWingsTier(cp) {
    if (cp >= 100) return 5;
    if (cp >= 60) return 4;
    if (cp >= 30) return 3;
    if (cp >= 10) return 2;
    return 1;
}

async function deleteTemplate(id) {
    if (!confirm('Delete this template? This cannot be undone.')) return;
    try {
        await api.deleteTemplate(id);
        showToast('Template deleted', 'success');
        if (currentUser) {
            const updated = await api.getCurrentUser();
            if (updated && updated.user) currentUser = updated.user;
            renderProfileHeader();
            loadTemplates();
        }
    } catch (err) {
        showToast(err.message, 'error');
    }
}

function openTemplate(id) {
    window.location.href = `amenodes.html?template=${id}`;
}

async function loadTemplates() {
    const container = document.getElementById('templatesContainer');
    if (!container) return;
    
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>';
    
    try {
        const data = await api.getUserTemplates(currentUser.id, currentTab);
        if (!data.templates || data.templates.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-cubes"></i>
                    No templates found
                    <div style="font-size: 12px; margin-top: 8px;">Create your first template in the Editor</div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = data.templates.map(tpl => `
            <div class="template-card">
                <div class="card-content">
                    <div class="card-info">
                        <div class="card-title">
                            <span>${escapeHtml(tpl.title)}</span>
                            <span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>
                        </div>
                        <div class="card-desc">${escapeHtml(tpl.description || 'No description')}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                            ${tpl.creator_points_awarded > 0 ? `<span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} CP</span>` : ''}
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-secondary" onclick="openTemplate(${tpl.id})">Open</button>
                        <button class="btn btn-danger" onclick="deleteTemplate(${tpl.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Failed to load templates</div>`;
    }
}

function renderProfileHeader() {
    const container = document.getElementById('container');
    if (!container) return;
    
    const cp = currentUser.creator_points;
    const wingColor = getWingColor(cp);
    const tier = getWingsTier(cp);
    
    container.innerHTML = `
        <div class="profile-wing-card wings-tier-${tier}">
            <div class="wing-container">
                <div class="wing-left" style="color: ${wingColor};">
                    <i class="fas fa-feather-alt"></i>
                </div>
                <div class="cp-center">
                    <div class="cp-number">${cp}</div>
                    <div class="cp-label">Creator Points</div>
                    <div class="username-badge">${escapeHtml(currentUser.username)}</div>
                </div>
                <div class="wing-right" style="color: ${wingColor};">
                    <i class="fas fa-feather-alt"></i>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab ${currentTab === 'all' ? 'active' : ''}" data-tab="all">All</button>
            <button class="tab ${currentTab === 'approved' ? 'active' : ''}" data-tab="approved">Approved</button>
            <button class="tab ${currentTab === 'pending' ? 'active' : ''}" data-tab="pending">Pending</button>
            <button class="tab ${currentTab === 'rejected' ? 'active' : ''}" data-tab="rejected">Rejected</button>
        </div>
        
        <div id="templatesContainer">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>
        </div>
    `;
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            renderProfileHeader();
            loadTemplates();
        };
    });
    
    loadTemplates();
}

function updateAuthUI() {
    const authSection = document.getElementById('authSection');
    if (!authSection) return;
    
    if (currentUser) {
        authSection.innerHTML = `
            <div class="user-panel">
                <span class="user-name">${currentUser.username}</span>
                <span class="user-points">${currentUser.creator_points} CP</span>
                <button id="logoutBtn" style="background: none; border: none; color: #ffb347; cursor: pointer;">Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => {
            api.logout();
            window.location.reload();
        };
    } else {
        authSection.innerHTML = '<a href="amenodes.html" style="background:#ffb347; color:#1a1f30; padding:6px 16px; border-radius:30px; text-decoration:none;">Login</a>';
    }
}

async function init() {
    try {
        const data = await api.getCurrentUser();
        if (data && data.success) {
            currentUser = data.user;
            updateAuthUI();
            renderProfileHeader();
        } else {
            updateAuthUI();
            const container = document.getElementById('container');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <p>Please login to view your profile</p>
                        <button class="btn btn-secondary" onclick="window.location.href='amenodes.html'">Go to Editor</button>
                    </div>
                `;
            }
        }
    } catch (err) {
        console.error(err);
        updateAuthUI();
    }
}

window.openTemplate = openTemplate;
window.deleteTemplate = deleteTemplate;
init();
</script>
</body>
</html>
