<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html">Editor</a>
        <a href="templates.html">Templates</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="container" id="container">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading profile...</div>
</div>

<script>
const API_BASE = 'https://amenoke.ru/api';

class API {
    constructor() {
        this.token = localStorage.getItem('auth_token');
    }

    setToken(token) {
        this.token = token;
        if (token) localStorage.setItem('auth_token', token);
        else localStorage.removeItem('auth_token');
    }

    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
        
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async getCurrentUser() {
        if (!this.token) return null;
        try { return await this.request('/me.php'); }
        catch { return null; }
    }

    async getUserTemplates(userId, status = 'all') {
        return this.request(`/user_templates.php?user_id=${userId}&status=${status}`);
    }

    async deleteTemplate(templateId) {
        return this.request('/delete_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: templateId })
        });
    }
}

const api = new API();
let currentUser = null;
let currentTab = 'all';

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function getStatusClass(status) {
    const map = { 'pending': 'status-pending', 'approved': 'status-approved', 'rejected': 'status-rejected' };
    return map[status] || 'status-pending';
}

function getStatusName(status) {
    const map = { 'pending': 'Pending', 'approved': 'Approved', 'rejected': 'Rejected' };
    return map[status] || status;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getCardGradientAndGlossColor(cp) {
    let stars = cp / 10;
    let baseColor, secondColor, thirdColor, glossColor;
    
    if (stars <= 8) {
        const colors = [
            '#2a5a8a', '#3a6a9a', '#4a7aaa', '#5a8aba', '#6a9aca',
            '#7abaaa', '#c8b84a', '#d0a03a', '#c8702a', '#b05020',
            '#a03050', '#903070', '#804090', '#6050a0', '#4060b0',
            '#304090', '#102070'
        ];
        let idx = Math.floor(stars * 2);
        idx = Math.min(colors.length - 1, Math.max(0, idx));
        baseColor = colors[idx];
        secondColor = colors[Math.min(colors.length-1, idx+1)];
        thirdColor = colors[Math.max(0, idx-1)];
        glossColor = thirdColor;
    } else {
        let excess = stars - 8;
        let purpleFactor = Math.max(0, (excess - 2) / 4);
        let darkBlue = '#102070';
        let blackBase = '#0a0a14';
        if (purpleFactor > 0) {
            let purple1 = `rgba(140, 70, 200, ${0.4 + purpleFactor * 0.3})`;
            let purple2 = `rgba(180, 110, 240, ${0.3 + purpleFactor * 0.3})`;
            baseColor = blackBase;
            secondColor = purple1;
            thirdColor = purple2;
            glossColor = `rgba(200, 130, 255, ${0.5 + purpleFactor * 0.3})`;
        } else {
            let mix = Math.min(1, (stars - 8) / 2);
            let r = 16 + (10 - 16) * mix;
            let g = 32 + (10 - 32) * mix;
            let b = 112 + (20 - 112) * mix;
            let transitionColor = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
            baseColor = darkBlue;
            secondColor = transitionColor;
            thirdColor = blackBase;
            glossColor = `rgba(100, 150, 220, ${0.3 + mix * 0.2})`;
        }
    }
    
    const gradient = `linear-gradient(115deg, ${baseColor}, ${secondColor} 20%, ${thirdColor} 50%, ${secondColor} 80%, ${baseColor})`;
    return { gradient, glossColor };
}

function generateTriangles(cp) {
    let tier = cp >= 100 ? 5 : cp >= 60 ? 4 : cp >= 30 ? 3 : cp >= 10 ? 2 : 1;
    const triangles = [];
    const baseColor = `rgba(255,255,255,0.15)`;
    const brightColor = `rgba(255,200,255,0.4)`;
    const purpleColor = `rgba(180,100,220,0.5)`;
    
    const add = (w, h, top, left, rot, color, op, anim) => {
        triangles.push({ w, h, top, left, rot, color, op, anim });
    };
    
    add(60, 60, '10%', '-20%', 45, baseColor, 0.4);
    add(40, 40, '70%', '90%', -20, baseColor, 0.3);
    add(50, 50, '85%', '5%', 70, baseColor, 0.35);
    if (tier >= 2) {
        add(80, 80, '-10%', '40%', 30, brightColor, 0.5);
        add(55, 55, '50%', '85%', -15, baseColor, 0.45, 'float 6s infinite');
        add(45, 45, '20%', '60%', 110, baseColor, 0.4);
        add(70, 70, '75%', '15%', -40, brightColor, 0.35);
    }
    if (tier >= 3) {
        add(120, 120, '-20%', '20%', 55, purpleColor, 0.5, 'drift 8s infinite');
        add(90, 90, '60%', '-15%', -25, brightColor, 0.45, 'driftSlow 10s infinite');
        add(70, 70, '30%', '70%', 85, baseColor, 0.5, 'float 7s infinite');
        add(100, 100, '80%', '50%', 15, purpleColor, 0.4, 'floatReverse 9s infinite');
    }
    if (tier >= 4) {
        add(150, 150, '-30%', '70%', 40, purpleColor, 0.6, 'glowPulse 4s infinite');
        add(130, 130, '50%', '-20%', -10, brightColor, 0.55, 'glowPulse 5s infinite');
        add(80, 80, '10%', '40%', 110, `rgba(200,130,255,0.45)`, 0.6, 'float 6s infinite');
        add(110, 110, '70%', '60%', -35, `rgba(180,100,220,0.5)`, 0.5, 'drift 7s infinite');
        add(60, 60, '40%', '20%', 15, brightColor, 0.6, 'pulse 3s infinite');
        add(95, 95, '20%', '85%', 75, purpleColor, 0.45, 'glowPulse 6s infinite');
    }
    if (tier >= 5) {
        add(200, 200, '-40%', '50%', 60, `rgba(200,100,255,0.7)`, 0.7, 'rotateSlow 12s infinite');
        add(180, 180, '30%', '-30%', -20, `rgba(255,150,200,0.65)`, 0.7, 'rotateFast 8s infinite');
        add(140, 140, '60%', '80%', 45, `rgba(180,80,220,0.6)`, 0.7, 'glowPulse 5s infinite');
        add(120, 120, '80%', '10%', -55, `rgba(220,120,255,0.6)`, 0.7, 'drift 10s infinite');
        add(100, 100, '10%', '60%', 25, `rgba(200,100,200,0.65)`, 0.7, 'float 7s infinite');
        add(160, 160, '50%', '120%', 85, `rgba(180,70,220,0.55)`, 0.7, 'driftSlow 9s infinite');
        add(75, 75, '85%', '45%', -15, `rgba(255,150,255,0.8)`, 0.7, 'pulse 4s infinite');
        add(130, 130, '-10%', '-10%', 110, `rgba(220,100,255,0.6)`, 0.7, 'rotateSlow 14s infinite');
    }
    return triangles;
}

function applyTriangles(card, cp) {
    const container = card.querySelector('.triangles-container');
    if (!container) return;
    container.innerHTML = '';
    const tris = generateTriangles(cp);
    for (const t of tris) {
        const div = document.createElement('div');
        div.className = 'triangle';
        div.style.width = `${t.w}px`;
        div.style.height = `${t.h}px`;
        div.style.top = t.top;
        div.style.left = t.left;
        div.style.transform = `rotate(${t.rot}deg)`;
        div.style.background = `linear-gradient(135deg, ${t.color}, transparent)`;
        div.style.opacity = t.op;
        div.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
        if (t.anim) div.style.animation = t.anim;
        container.appendChild(div);
    }
}

function setupGlossEffect(card, glossColor) {
    const gloss = card.querySelector('.card-gloss');
    if (!gloss) return;
    gloss.style.setProperty('--gloss-color', glossColor);
    
    const onMove = (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        gloss.style.setProperty('--x', `${x}%`);
        gloss.style.setProperty('--y', `${y}%`);
    };
    
    card.addEventListener('mousemove', onMove);
}

function addAnimationStyles() {
    if (document.getElementById('profile-anims')) return;
    const style = document.createElement('style');
    style.id = 'profile-anims';
    style.textContent = `
        @keyframes float {
            0% { transform: rotate(45deg) translateY(0px); }
            50% { transform: rotate(50deg) translateY(-15px); }
            100% { transform: rotate(45deg) translateY(0px); }
        }
        @keyframes floatReverse {
            0% { transform: rotate(-35deg) translateY(0px); }
            50% { transform: rotate(-40deg) translateY(15px); }
            100% { transform: rotate(-35deg) translateY(0px); }
        }
        @keyframes drift {
            0% { transform: rotate(30deg) translateX(0px) translateY(0px); }
            50% { transform: rotate(35deg) translateX(20px) translateY(-10px); }
            100% { transform: rotate(30deg) translateX(0px) translateY(0px); }
        }
        @keyframes driftSlow {
            0% { transform: rotate(-20deg) translateX(0px) translateY(0px); }
            50% { transform: rotate(-25deg) translateX(-15px) translateY(10px); }
            100% { transform: rotate(-20deg) translateX(0px) translateY(0px); }
        }
        @keyframes glowPulse {
            0% { opacity: 0.4; filter: blur(0px); }
            50% { opacity: 0.8; filter: blur(3px); }
            100% { opacity: 0.4; filter: blur(0px); }
        }
        @keyframes pulse {
            0% { transform: rotate(15deg) scale(1); opacity: 0.5; }
            50% { transform: rotate(20deg) scale(1.05); opacity: 0.8; }
            100% { transform: rotate(15deg) scale(1); opacity: 0.5; }
        }
        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateFast {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(style);
}

async function deleteTemplate(id) {
    if (!confirm('Delete this template? This cannot be undone.')) return;
    try {
        await api.deleteTemplate(id);
        showToast('Template deleted', 'success');
        if (currentUser) {
            const updated = await api.getCurrentUser();
            if (updated && updated.user) currentUser = updated.user;
            renderProfileHeader();
            loadTemplates();
        }
    } catch (err) {
        showToast(err.message, 'error');
    }
}

function openTemplate(id) {
    window.location.href = `amenodes.html?template=${id}`;
}

async function loadTemplates() {
    const container = document.getElementById('templatesContainer');
    if (!container) return;
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>';
    try {
        const data = await api.getUserTemplates(currentUser.id, currentTab);
        if (!data.templates || data.templates.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-cubes"></i> No templates found<div style="font-size:12px;margin-top:8px;">Create your first template in the Editor</div></div>`;
            return;
        }
        container.innerHTML = data.templates.map(tpl => `
            <div class="template-card">
                <div class="template-content">
                    <div class="template-info">
                        <div class="template-title">
                            <span>${escapeHtml(tpl.title)}</span>
                            <span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>
                        </div>
                        <div class="template-desc">${escapeHtml(tpl.description || 'No description')}</div>
                        <div class="template-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                            ${tpl.creator_points_awarded > 0 ? `<span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} CP</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="template-actions">
                    <button class="btn btn-secondary" onclick="openTemplate(${tpl.id})">Open</button>
                    <button class="btn btn-danger" onclick="deleteTemplate(${tpl.id})">Delete</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Failed to load templates</div>`;
    }
}

function renderProfileHeader() {
    const container = document.getElementById('container');
    if (!container) return;
    const cp = currentUser.creator_points;
    const { gradient, glossColor } = getCardGradientAndGlossColor(cp);
    
    container.innerHTML = `
        <div class="profile-card">
            <div class="card-gradient-layer" style="background: ${gradient};"></div>
            <div class="card-gloss"></div>
            <div class="triangles-container"></div>
            <div class="card-content">
                <div class="cp-number">${cp}</div>
                <div class="cp-label">Creator Points</div>
                <div class="username-badge">${escapeHtml(currentUser.username)}</div>
            </div>
        </div>
        <div class="tabs">
            <button class="tab ${currentTab === 'all' ? 'active' : ''}" data-tab="all">All</button>
            <button class="tab ${currentTab === 'approved' ? 'active' : ''}" data-tab="approved">Approved</button>
            <button class="tab ${currentTab === 'pending' ? 'active' : ''}" data-tab="pending">Pending</button>
            <button class="tab ${currentTab === 'rejected' ? 'active' : ''}" data-tab="rejected">Rejected</button>
        </div>
        <div id="templatesContainer"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div></div>
    `;
    
    const card = document.querySelector('.profile-card');
    if (card) {
        applyTriangles(card, cp);
        setupGlossEffect(card, glossColor);
    }
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            renderProfileHeader();
            loadTemplates();
        };
    });
    loadTemplates();
}

function updateAuthUI() {
    const authSection = document.getElementById('authSection');
    if (!authSection) return;
    if (currentUser) {
        authSection.innerHTML = `
            <div class="user-panel">
                <span class="user-name">${currentUser.username}</span>
                <span class="user-points">${currentUser.creator_points} CP</span>
                <button id="logoutBtn" style="background: none; border: none; color: #ffb347; cursor: pointer;">Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => { api.logout(); window.location.reload(); };
    } else {
        authSection.innerHTML = '<a href="amenodes.html" style="background:#ffb347; color:#1a1f30; padding:6px 16px; border-radius:30px; text-decoration:none;">Login</a>';
    }
}

async function init() {
    addAnimationStyles();
    try {
        const data = await api.getCurrentUser();
        if (data && data.success) {
            currentUser = data.user;
            updateAuthUI();
            renderProfileHeader();
        } else {
            updateAuthUI();
            document.getElementById('container').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-lock"></i>
                    <p>Please login to view your profile</p>
                    <button class="btn btn-secondary" onclick="window.location.href='amenodes.html'">Go to Editor</button>
                </div>
            `;
        }
    } catch (err) {
        updateAuthUI();
    }
}

window.openTemplate = openTemplate;
window.deleteTemplate = deleteTemplate;
init();
</script>
</body>
</html>
