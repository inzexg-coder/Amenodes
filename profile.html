<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: linear-gradient(135deg, #0a0c14 0%, #121624 100%);
            min-height: 100vh;
            color: #eef2ff;
        }

        .header {
            background: #0f1222cc;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2e385c;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ffb347;
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #aabbdd;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffb347;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #ffb347;
            color: #1a1f30;
        }

        .btn-primary:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #2d3a5e;
            color: #eef2ff;
        }

        .btn-secondary:hover {
            background: #3f4e7a;
        }

        .btn-danger {
            background: #8b3a3a;
            color: #ffcccc;
        }

        .btn-danger:hover {
            background: #aa4a4a;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2a2a3a;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .user-name {
            color: #ffd700;
            font-weight: bold;
        }

        .user-points {
            font-size: 12px;
            color: #aaa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
      
        .profile-header {
            background: #0f1222;
            border-radius: 24px;
            border: 1px solid #2e385c;
            padding: 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #1a1f30;
        }

        .stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffb347;
        }

        .stat-label {
            font-size: 12px;
            color: #8899bb;
        }

        .rank-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #2e385c;
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #8899bb;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }

        .tab.active {
            color: #ffb347;
            border-bottom: 2px solid #ffb347;
        }
      
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .template-card {
            background: #0f1222;
            border-radius: 16px;
            border: 1px solid #2e385c;
            overflow: hidden;
            transition: all 0.3s;
        }

        .template-card:hover {
            transform: translateY(-2px);
            border-color: #ffb347;
        }

        .card-header {
            padding: 16px;
            border-bottom: 1px solid #2e385c;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-desc {
            font-size: 12px;
            color: #8899bb;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #667799;
        }

        .card-footer {
            padding: 12px 16px;
            background: #0a0c14;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-pending {
            background: #ff8c00;
            color: #1a1f30;
        }

        .status-approved {
            background: #2e7d32;
            color: #fff;
        }

        .status-rejected {
            background: #c62828;
            color: #fff;
        }

        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .level-regular { background: #555; color: #ccc; }
        .level-featured { background: #ffd700; color: #1a1f30; }
        .level-epic { background: #ff69b4; color: #1a1f30; }
        .level-legendary { background: #00bfff; color: #1a1f30; }
        .level-godlike { background: linear-gradient(135deg, #9b59b6, #ff69b4); color: #fff; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #667799;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8899bb;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .toast-success { background: #2e7d32; }
        .toast-error { background: #c62828; }
        .toast-info { background: #1565c0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .auth-modal-content {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
            color: #fff;
        }

        .auth-modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-info { justify-content: center; }
            .templates-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html"><i class="fas fa-edit"></i> Editor</a>
        <a href="templates.html"><i class="fas fa-cubes"></i> Templates</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
    </div>
    <div class="auth-section" id="authSection"></div>
</div>

<div class="container" id="container">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading profile...</div>
</div>

<script>
const API_BASE = 'https://amenoke.ru/api';

class API {
    constructor() {
        this.token = localStorage.getItem('auth_token');
    }

    setToken(token) {
        this.token = token;
        if (token) localStorage.setItem('auth_token', token);
        else localStorage.removeItem('auth_token');
    }

    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
        
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async login(login, password) {
        const data = await this.request('/login.php', {
            method: 'POST',
            body: JSON.stringify({ login, password })
        });
        if (data.token) this.setToken(data.token);
        return data;
    }

    async register(username, email, password) {
        return this.request('/register.php', {
            method: 'POST',
            body: JSON.stringify({ username, email, password })
        });
    }

    logout() { this.setToken(null); }

    async getCurrentUser() {
        if (!this.token) return null;
        try { return await this.request('/me.php'); }
        catch { return null; }
    }

    async getUserTemplates(userId, status = 'all') {
        return this.request(`/user_templates.php?user_id=${userId}&status=${status}`);
    }

    async deleteTemplate(templateId) {
        return this.request('/delete_template.php', {
            method: 'POST',
            body: JSON.stringify({ template_id: templateId })
        });
    }
}

const api = new API();
let currentUser = null;
let currentTab = 'all';

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function showAuthModal() {
    const modal = document.createElement('div');
    modal.className = 'auth-modal';
    modal.innerHTML = `
        <div class="auth-modal-content">
            <span class="auth-modal-close">&times;</span>
            <h3 style="text-align:center;">Login Required</h3>
            <p style="margin: 16px 0; text-align:center;">Please login to view your profile</p>
            <button id="gotoLoginBtn" class="btn btn-primary" style="width:100%;">Go to Login</button>
        </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.auth-modal-close').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    document.getElementById('gotoLoginBtn').onclick = () => {
        modal.remove();
        window.location.href = 'amenodes.html';
    };
}

function getRankInfo(points) {
    if (points >= 2500) return { name: 'Legend', bg: '#9b59b6', glow: '#bb8fce' };
    if (points >= 1000) return { name: 'Champion', bg: '#ff4444', glow: '#ff8888' };
    if (points >= 500) return { name: 'Diamond', bg: '#b9f2ff', glow: '#00ffff' };
    if (points >= 200) return { name: 'Platinum', bg: '#e5e4e2', glow: '#ffffff' };
    if (points >= 50) return { name: 'Gold', bg: '#ffd700', glow: '#ffec80' };
    if (points >= 10) return { name: 'Silver', bg: '#c0c0c0', glow: '#e0e0e0' };
    return { name: 'Bronze', bg: '#cd7f32', glow: 'none' };
}

function getStatusText(status) {
    const map = { 'pending': 'Pending', 'approved': 'Approved', 'rejected': 'Rejected' };
    return map[status] || status;
}

function getLevelName(level) {
    const map = {
        'regular': 'Regular',
        'featured': 'Featured',
        'epic': 'Epic',
        'legendary': 'Legendary',
        'godlike': 'Godlike'
    };
    return map[level] || 'Regular';
}

function getLevelClass(level) {
    const map = {
        'regular': 'level-regular',
        'featured': 'level-featured',
        'epic': 'level-epic',
        'legendary': 'level-legendary',
        'godlike': 'level-godlike'
    };
    return map[level] || 'level-regular';
}

async function loadTemplates() {
    if (!currentUser) return;
    
    const container = document.getElementById('templatesContainer');
    if (!container) return;
    
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>';
    
    try {
        const data = await api.getUserTemplates(currentUser.id, currentTab);
        
        if (!data.templates || data.templates.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-cubes"></i>
                    <p>No templates found</p>
                    <small>Create your first template in the Editor!</small>
                </div>
            `;
            return;
        }
        
        container.innerHTML = data.templates.map(tpl => `
            <div class="template-card">
                <div class="card-header">
                    <div class="card-title">
                        <span>${escapeHtml(tpl.title)}</span>
                        <div style="display: flex; gap: 8px;">
                            ${tpl.status === 'approved' ? `<span class="level-badge ${getLevelClass(tpl.verification_level)}">${getLevelName(tpl.verification_level)}</span>` : ''}
                            <span class="status-badge status-${tpl.status}">${getStatusText(tpl.status)}</span>
                        </div>
                    </div>
                    <div class="card-desc">${escapeHtml(tpl.description || 'No description')}</div>
                    <div class="card-meta">
                        <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                        ${tpl.creator_points_awarded > 0 ? `<span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} CP</span>` : ''}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-secondary" onclick="openTemplate(${tpl.id})" style="padding: 6px 16px;">Open</button>
                    <button class="btn btn-danger" onclick="deleteTemplate(${tpl.id})" style="padding: 6px 16px;">Delete</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load templates</p></div>`;
    }
}

function openTemplate(id) {
    window.location.href = `amenodes.html?template=${id}`;
}

async function deleteTemplate(id) {
    if (!confirm('Are you sure you want to delete this template? This action cannot be undone.')) return;
    
    try {
        await api.deleteTemplate(id);
        showToast('Template deleted', 'success');
        loadTemplates();
        if (currentUser) {
            const userData = await api.getCurrentUser();
            if (userData && userData.user) {
                currentUser = userData.user;
                renderProfileHeader();
            }
        }
    } catch (err) {
        showToast(err.message, 'error');
    }
}

function renderProfileHeader() {
    const container = document.getElementById('container');
    if (!container) return;
    
    const rank = getRankInfo(currentUser.creator_points);
    
    container.innerHTML = `
        <div class="profile-header">
            <div class="profile-info">
                <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                <div>
                    <h2>${escapeHtml(currentUser.username)}</h2>
                    <div class="rank-badge" style="background: ${rank.bg}; color: ${rank.name === 'Bronze' ? '#fff' : '#1a1f30'}; margin-top: 8px;">${rank.name}</div>
                </div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">${currentUser.creator_points}</div>
                    <div class="stat-label">Creator Points</div>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab ${currentTab === 'all' ? 'active' : ''}" data-tab="all">All</button>
            <button class="tab ${currentTab === 'approved' ? 'active' : ''}" data-tab="approved">Approved</button>
            <button class="tab ${currentTab === 'pending' ? 'active' : ''}" data-tab="pending">Pending</button>
            <button class="tab ${currentTab === 'rejected' ? 'active' : ''}" data-tab="rejected">Rejected</button>
        </div>
        
        <div id="templatesContainer">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading templates...</div>
        </div>
    `;
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            renderProfileHeader();
            loadTemplates();
        };
    });
    
    loadTemplates();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function updateAuthUI() {
    const authSection = document.getElementById('authSection');
    if (!authSection) return;
    
    if (currentUser) {
        authSection.innerHTML = `
            <div class="user-panel">
                <span class="user-name">${currentUser.username}</span>
                <span class="user-points">⭐ ${currentUser.creator_points} CP</span>
                <button id="logoutBtn" class="btn btn-secondary" style="padding: 4px 12px;">Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => {
            api.logout();
            window.location.reload();
        };
    } else {
        authSection.innerHTML = '<button id="loginBtnHeader" class="btn btn-outline" style="background:transparent; border:1px solid #ffb347; color:#ffb347; padding:6px 16px; border-radius:30px;">Login</button>';
        const loginBtn = document.getElementById('loginBtnHeader');
        if (loginBtn) loginBtn.onclick = () => window.location.href = 'amenodes.html';
    }
}

async function init() {
    try {
        const data = await api.getCurrentUser();
        if (data && data.success) {
            currentUser = data.user;
            updateAuthUI();
            renderProfileHeader();
        } else {
            updateAuthUI();
            const container = document.getElementById('container');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <p>Please login to view your profile</p>
                        <button class="btn btn-primary" onclick="window.location.href='amenodes.html'">Go to Editor</button>
                    </div>
                `;
            }
        }
    } catch (err) {
        console.error(err);
        updateAuthUI();
    }
}

init();
</script>
</body>
</html>
