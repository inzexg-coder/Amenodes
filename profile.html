<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title data-i18n="profile.title">My Profile</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
    <div class="logo">
        <i class="fas fa-project-diagram"></i>
        <span>Amenodes</span>
    </div>
    <div class="nav-links">
        <a href="amenodes.html" data-i18n="profile.editorLink">Editor</a>
        <a href="templates.html" data-i18n="profile.templatesLink">Templates</a>
        <a href="profile.html" class="active" data-i18n="profile.profileLink">Profile</a>
    </div>
    <div id="authSection"></div>
</div>

<div class="profile-container" id="container">
    <div class="loading"><i class="fas fa-spinner"></i> <span data-i18n="profile.loading">Loading profile...</span></div>
</div>

<script type="module">
    import { i18n, t } from './src/i18n/LanguageManager.js';
    
    function updateAllTexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key) el.textContent = t(key);
        });
        document.title = t('profile.title');
    }
    
    i18n.subscribe(() => updateAllTexts());
    updateAllTexts();
    
    const API_BASE = 'https://amenoke.ru/api';
    let currentUser = null;
    let currentTab = 'all';
    
    function getToken() { return localStorage.getItem('auth_token'); }
    
    async function apiRequest(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        const token = getToken();
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }
    
    async function getCurrentUser() {
        const token = getToken();
        if (!token) return null;
        try { return await apiRequest('/me.php'); }
        catch { return null; }
    }
    
    async function getUserTemplates(userId, status = 'all') {
        return apiRequest(`/user_templates.php?user_id=${userId}&status=${status}`);
    }
    
    async function deleteTemplate(id) {
        return apiRequest('/delete_template.php', { 
            method: 'POST', 
            body: JSON.stringify({ template_id: id }) 
        });
    }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function getStatusClass(status) { return `status-${status}`; }
    function getStatusName(status) { return t(`profile.${status}Tab`); }
    
    function getCardColor(cp) {
        let stars = cp / 10;
        const colors = ['#5a9cff','#6aaaff','#7ab8ff','#8ac6ff','#9ad4ff','#aae2aa','#e8c84a','#f0a03a','#e8702a','#d04020','#c02050','#b03080','#a040b0','#8050c0','#5060d0','#3040a0','#102070','#0a0a14','#0a0a14'];
        let idx = Math.min(colors.length - 1, Math.max(0, Math.floor(stars * 2)));
        return colors[idx];
    }
    
    function generateTriangles(cp) {
        let intensity = Math.min(1, Math.max(0, (cp - 100) / 50));
        let triangles = [];
        let count = 6 + Math.floor(intensity * 10);
        for (let i = 0; i < count; i++) {
            triangles.push({ 
                size: 30 + Math.random() * 120, 
                top: Math.random() * 100 + '%', 
                left: Math.random() * 100 + '%', 
                rot: Math.random() * 360, 
                opacity: 0.15 + intensity * 0.35 
            });
        }
        return triangles;
    }
    
    function applyTriangles(card, cp) {
        const container = card.querySelector('.triangles-container');
        if (!container) return;
        container.innerHTML = '';
        generateTriangles(cp).forEach(t => {
            const div = document.createElement('div');
            div.className = 'triangle';
            div.style.cssText = `width:${t.size}px;height:${t.size}px;top:${t.top};left:${t.left};transform:rotate(${t.rot}deg);background:linear-gradient(135deg,rgba(180,100,220,${t.opacity}),transparent);clip-path:polygon(50% 0%,0% 100%,100% 100%);`;
            container.appendChild(div);
        });
    }
    
    function setupGlossEffect(card) {
        const gloss = card.querySelector('.card-gloss');
        if (!gloss) return;
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            gloss.style.setProperty('--x', `${((e.clientX - rect.left) / rect.width) * 100}%`);
            gloss.style.setProperty('--y', `${((e.clientY - rect.top) / rect.height) * 100}%`);
        });
    }
    
    async function loadTemplates() {
        const container = document.getElementById('templatesContainer');
        if (!container) return;
        container.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> ${t('common.loading')}</div>`;
        try {
            const data = await getUserTemplates(currentUser.id, currentTab);
            if (!data.templates || data.templates.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-cubes"></i> ${t('profile.noTemplates')}<div style="font-size:12px;margin-top:8px;">${t('profile.createFirst')}</div></div>`;
                return;
            }
            container.innerHTML = data.templates.map(tpl => `
                <div class="template-card">
                    <div class="template-content">
                        <div class="template-info">
                            <div class="template-title">
                                <span>${escapeHtml(tpl.title)}</span>
                                <span class="status-badge ${getStatusClass(tpl.status)}">${getStatusName(tpl.status)}</span>
                            </div>
                            <div class="template-desc">${escapeHtml(tpl.description || t('common.noDescription'))}</div>
                            <div class="template-meta">
                                <span><i class="fas fa-calendar"></i> ${new Date(tpl.created_at).toLocaleDateString()}</span>
                                ${tpl.creator_points_awarded > 0 ? `<span><i class="fas fa-star"></i> ${tpl.creator_points_awarded} CP</span>` : ''}
                            </div>
                        </div>
                        <div class="template-actions">
                            <button class="btn btn-secondary" onclick="window.openTemplate(${tpl.id})">${t('profile.open')}</button>
                            <button class="btn btn-danger" onclick="window.deleteTemplate(${tpl.id})">${t('profile.delete')}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) { 
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> ${t('common.error')}</div>`;
        }
    }
    
    window.openTemplate = (id) => window.location.href = `amenodes.html?template=${id}`;
    
    window.deleteTemplate = async (id) => {
        if (confirm(t('profile.deleteConfirm'))) {
            try { 
                await deleteTemplate(id); 
                showToast(t('profile.templateDeleted'), 'success'); 
                const updated = await getCurrentUser(); 
                if (updated?.user) currentUser = updated.user; 
                renderProfileHeader(); 
            } catch (err) { 
                showToast(err.message, 'error'); 
            }
        }
    };
    
    function renderProfileHeader() {
        const container = document.getElementById('container');
        const cp = currentUser.creator_points;
        const bgColor = getCardColor(cp);
        container.innerHTML = `
            <div class="profile-card">
                <div class="card-bg" style="background: ${bgColor};"></div>
                <div class="card-gloss"></div>
                <div class="triangles-container"></div>
                <div class="card-content">
                    <div class="cp-number">${cp}</div>
                    <div class="cp-label">${t('profile.creatorPoints')}</div>
                    <div class="username-badge">${escapeHtml(currentUser.username)}</div>
                </div>
            </div>
            <div class="tabs">
                <button class="tab ${currentTab === 'all' ? 'active' : ''}" data-tab="all">${t('profile.allTab')}</button>
                <button class="tab ${currentTab === 'approved' ? 'active' : ''}" data-tab="approved">${t('profile.approvedTab')}</button>
                <button class="tab ${currentTab === 'pending' ? 'active' : ''}" data-tab="pending">${t('profile.pendingTab')}</button>
                <button class="tab ${currentTab === 'rejected' ? 'active' : ''}" data-tab="rejected">${t('profile.rejectedTab')}</button>
            </div>
            <div id="templatesContainer"><div class="loading"><i class="fas fa-spinner"></i> ${t('common.loading')}</div></div>
        `;
        const card = document.querySelector('.profile-card');
        if (card) { 
            applyTriangles(card, cp); 
            setupGlossEffect(card); 
        }
        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderProfileHeader();
                loadTemplates();
            };
        });
        loadTemplates();
    }
    
    function updateAuthUI() {
        const authSection = document.getElementById('authSection');
        if (currentUser) {
            authSection.innerHTML = `<div class="user-panel"><span class="user-name">${escapeHtml(currentUser.username)}</span><span class="user-points">${currentUser.creator_points} CP</span><button id="logoutBtn" style="background:none;border:none;color:#b080ff;cursor:pointer;">${t('profile.logout')}</button></div>`;
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('auth_token'); window.location.reload(); };
        } else {
            authSection.innerHTML = `<a href="amenodes.html" style="background:#8a5aff;color:#1a1f30;padding:6px 16px;border-radius:30px;text-decoration:none;">${t('profile.login')}</a>`;
        }
    }
    
    (async () => {
        const data = await getCurrentUser();
        if (data?.success) { 
            currentUser = data.user; 
            updateAuthUI(); 
            renderProfileHeader(); 
        } else { 
            updateAuthUI(); 
            document.getElementById('container').innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>${t('profile.loginRequired')}</p><button class="btn btn-secondary" onclick="window.location.href='amenodes.html'">${t('profile.goToEditor')}</button></div>`;
        }
    })();
</script>
</body>
</html>
