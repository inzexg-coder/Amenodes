<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>@Amenodes</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="styles/main.css">
<style>
  .node-temp-selected { box-shadow: 0 0 0 3px #ffaa55, var(--node-shadow) !important; }
  .node-selected { box-shadow: 0 0 0 3px #3b82f6, 0 12px 28px rgba(0,0,0,0.4) !important; }
  .design-quality-extreme .node-selected { box-shadow: 0 0 0 2px #3b82f6 !important; }
</style>
</head>
<body>

<div class="app-layout">
  
  <aside class="sidebar left-sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-cubes"></i>
      <span>Amenodes</span>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title"><i class="fas fa-sliders-h"></i> Canvas</div>
      <div class="canvas-settings">
        <div class="setting-item">
          <label>Zoom</label>
          <input type="range" id="canvasZoomSlider" min="0.3" max="3" step="0.01" value="1">
          <span id="zoomValue">100%</span>
        </div>
        <div class="setting-item">
          <label>Grid</label>
          <button id="toggleGridBtn" class="setting-btn"><i class="fas fa-th"></i> Show Grid</button>
        </div>
        <div class="setting-item">
          <label>Background</label>
          <div class="color-option" data-color="dark" style="background:#0a0c14"></div>
          <div class="color-option" data-color="light" style="background:#eef2ff"></div>
          <div class="color-option" data-color="blend" style="background:radial-gradient(circle at 20% 30%, #1a1e2c, #0a0c14)"></div>
        </div>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title"><i class="fas fa-microchip"></i> Quick Tools</div>
      <button id="quickNodeMenuBtn" class="sidebar-btn"><i class="fas fa-plus-circle"></i> Add Node</button>
      <button id="quickOptimizeBtn" class="sidebar-btn"><i class="fas fa-tachometer-alt"></i> Optimize</button>
      <button id="quickRecenterBtn" class="sidebar-btn"><i class="fas fa-crosshairs"></i> Recenter View</button>
    </div>
    
    <div class="sidebar-footer">
      <div class="fps-meter-side" id="fpsMeterSide"><i class="fas fa-chart-line"></i> FPS: --</div>
    </div>
  </aside>
  
  <!-- MAIN CENTER: TOOLBAR + VIEWPORT -->
  <div class="main-area">
    <div class="top-toolbar">
      <div class="toolbar-group">
        <button id="undoBtn"><i class="fas fa-undo-alt"></i> Undo</button>
        <button id="redoBtn"><i class="fas fa-redo-alt"></i> Redo</button>
      </div>
      <div class="toolbar-group">
        <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
        <button id="importBtn"><i class="fas fa-upload"></i> Import</button>
        <button id="clearStorageBtn"><i class="fas fa-trash-alt"></i> Clear</button>
      </div>
      <div class="toolbar-group" id="languageSwitcherContainer"></div>
      <button id="globalOptToggleBtn" class="opt-icon-btn"><i class="fas fa-chart-line"></i> Perf</button>
    </div>
    
    <div class="viewport-wrapper">
      <div class="viewport" id="viewport">
        <div class="canvas-container" id="canvasContainer">
          <div class="nodes-layer" id="nodesLayer"></div>
        </div>
        <canvas id="webglCanvas" class="webgl-canvas" style="display:none;"></canvas>
      </div>
    </div>
  </div>
  
  <aside class="sidebar right-sidebar">
    <div class="sidebar-section">
      <div class="section-title"><i class="fas fa-info-circle"></i> Properties</div>
      <div id="propertiesPanel" class="properties-content">
        <div class="empty-props">
          <i class="fas fa-mouse-pointer"></i>
          <p>Select a node to edit properties</p>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="section-title"><i class="fas fa-cog"></i> Node Tools</div>
      <button id="deleteSelectedBtn" class="sidebar-btn danger-btn"><i class="fas fa-trash"></i> Delete Selected</button>
      <button id="duplicateSelectedBtn" class="sidebar-btn"><i class="fas fa-copy"></i> Duplicate</button>
    </div>
  </aside>
</div>

<div id="welcomeOverlay" class="welcome-overlay">
  <div class="welcome-card">
    <div class="welcome-icon"><i class="fas fa-cubes"></i></div>
    <h2>Amenodes</h2>
    <p>Node-based computation & data flow</p>
    <div class="welcome-buttons">
      <button id="welcomeNewProject" class="welcome-btn primary"><i class="fas fa-plus"></i> New Project</button>
      <button id="welcomeLoadSample" class="welcome-btn"><i class="fas fa-chart-simple"></i> Load Example</button>
      <button id="welcomeImport" class="welcome-btn"><i class="fas fa-folder-open"></i> Import .amnk</button>
    </div>
    <div class="welcome-recent">
      <span>No recent projects</span>
    </div>
    <div class="welcome-footer">
      <i class="fas fa-microchip"></i> Amenodes · drag & connect
    </div>
  </div>
</div>

<input type="file" id="fileInput" class="hidden-file-input" accept=".amnk">
<div id="optPanel" class="opt-panel hidden">
  <div class="opt-header">
    <span><i class="fas fa-microchip"></i> Performance Optimizations</span>
    <button id="closeOptPanel"><i class="fas fa-times"></i></button>
  </div>
  <div class="opt-list" id="optListContainer"></div>
  <button id="rebenchmarkBtn" class="rebench-btn"><i class="fas fa-chart-line"></i> Recalculate optimizations impact</button>
  <button id="applyOptimizationsBtn" class="apply-btn"><i class="fas fa-check-circle"></i> APPLY SELECTED</button>
</div>
<div id="autosaveStatus" class="autosave-status"><i class="fas fa-save"></i> Saved</div>
<div id="benchmarkStatus" class="benchmark-status" style="display:none;"><i class="fas fa-flask"></i> Benchmarking...</div>

<script type="importmap">
{
  "imports": {
    "./src/main.js": "./src/main.js"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
