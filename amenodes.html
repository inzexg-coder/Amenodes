<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>@Amenodes</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="top-bar">
    <div class="logo-area">
        <i class="fas fa-project-diagram"></i>
        <span class="logo-text">Amenodes</span>
    </div>
    <div class="toolbar-actions">
        <button id="undoBtn" class="tool-btn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i><span>Undo</span></button>
        <button id="redoBtn" class="tool-btn" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i><span>Redo</span></button>
        <div class="divider"></div>
        <button id="addNodeBtn" class="tool-btn primary-btn"><i class="fas fa-plus-circle"></i><span>Add Node</span></button>
        <div class="divider"></div>
        <button id="exportBtn" class="tool-btn"><i class="fas fa-download"></i><span>Export</span></button>
        <button id="importBtn" class="tool-btn"><i class="fas fa-upload"></i><span>Import</span></button>
        <button id="clearStorageBtn" class="tool-btn"><i class="fas fa-trash-alt"></i><span>Clear</span></button>
    </div>
    <div class="right-actions">
        <div id="languageSwitcherContainer"></div>
        <button id="optToggleBtn" class="tool-btn" title="Performance Settings"><i class="fas fa-tachometer-alt"></i></button>
    </div>
</div>

<div class="viewport" id="viewport">
    <div class="canvas-container" id="canvasContainer">
        <div class="nodes-layer" id="nodesLayer"></div>
    </div>
</div>
<div id="nodeSelectorModal" class="modal-overlay" style="display: none;">
    <div class="modal-container node-selector-modal">
        <div class="modal-header">
            <h3><i class="fas fa-cubes"></i> Add Node</h3>
            <button class="modal-close" id="closeNodeSelectorBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="nodeSearchInput" placeholder="Search nodes...">
            </div>
            <div class="node-list" id="nodeListContainer">
            </div>
        </div>
    </div>
</div>

<div id="optPanel" class="opt-panel hidden">
    <div class="opt-header">
        <span><i class="fas fa-microchip"></i> Performance Optimizations</span>
        <button id="closeOptPanel"><i class="fas fa-times"></i></button>
    </div>
    <div class="opt-list" id="optListContainer"></div>
    <button id="rebenchmarkBtn" class="rebench-btn"><i class="fas fa-chart-line"></i> Recalculate Impact</button>
    <button id="applyOptimizationsBtn" class="apply-btn"><i class="fas fa-check-circle"></i> Apply Selected</button>
</div>

<div class="fps-meter" id="fpsMeter"><i class="fas fa-tachometer-alt"></i> FPS: --</div>
<div id="autosaveStatus" class="autosave-status"><i class="fas fa-save"></i> <span>Saved</span></div>
<div id="benchmarkStatus" class="benchmark-status" style="display: none;">Testing optimizations...</div>

<input type="file" id="fileInput" class="hidden-file-input" accept=".amnk">

<script type="importmap">
{
    "imports": {
        "./src/main.js": "./src/main.js"
    }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
