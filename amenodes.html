</div>

<script type="importmap">
{
  "imports": {
    "./utils/SymbolMapper.js": "./utils/SymbolMapper.js",
    "./ui/EditableTitle.js": "./ui/EditableTitle.js",
    "./core/Node.js": "./core/Node.js",
    "./core/Edge.js": "./core/Edge.js",
    "./core/Graph.js": "./core/Graph.js",

    "./nodes/MapNode.js": "./nodes/MapNode.js",
    "./rendering/Viewport.js": "./rendering/Viewport.js",
    "./rendering/DomRenderer.js": "./rendering/DomRenderer.js",
    "./ui/OptimizationPanel.js": "./ui/OptimizationPanel.js",
    "./utils/FPSCounter.js": "./utils/FPSCounter.js",

<script type="module">
import { Graph } from './core/Graph.js';
import { Viewport } from './rendering/Viewport.js';
import { DomRenderer } from './rendering/DOMRenderer.js';
import { History } from './core/History.js';
import { NumberNode } from './nodes/NumberNode.js';
import { GroupNode } from './nodes/GroupNode.js';
import { OutputNode } from './nodes/OutputNode.js';
import { FPSCounter } from './utils/FPSCounter.js';
import { OptimizationPanel } from './ui/OptimizationPanel.js';
import { OPTIMIZATIONS } from './config/Optimizations.js';

const graph = new Graph();
const viewportEl = document.getElementById('viewport');
const canvasContainer = document.getElementById('canvasContainer');
const nodesLayer = document.getElementById('nodesLayer');

const vp = new Viewport(viewportEl, canvasContainer);
const renderer = new DomRenderer(graph, nodesLayer, viewportEl);
const history = new History(graph);
const fpsCounter = new FPSCounter('fpsMeter');
const optPanel = new OptimizationPanel('optPanel', 'optToggleBtn', 'closeOptPanel', 'applyOptimizationsBtn', 'rebenchmarkBtn');

renderer.setViewport(vp);
renderer.setHistory(history);
vp.attach();
vp.onChange = () => { if (renderer.virtual) renderer.render(); };

let currentZoom = 1;
const minZoom = 0.3, maxZoom = 3;
window.setZoom = (z) => {
  currentZoom = Math.min(maxZoom, Math.max(minZoom, z));
  vp.update();
  if (renderer.virtual) renderer.render();
};
window.currentZoom = currentZoom;

viewportEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = -e.deltaY * 0.005;
  window.setZoom(currentZoom * (1 + delta));
}, { passive: false });

window.applyDesignQuality = (p) => {
  window.currentQualityValue = p;
  window._designQualitySaved = p;
  document.body.classList.remove('design-quality-extreme', 'design-quality-1', 'design-quality-2');
  if (p <= 20) document.body.classList.add('design-quality-extreme');
  else if (p <= 50) document.body.classList.add('design-quality-1');
  else if (p <= 80) document.body.classList.add('design-quality-2');
};
window.currentQualityValue = 100;
window._designQualitySaved = 100;

window.addEventListener('mousemove', (e) => renderer.onGlobalMove(e));
window.addEventListener('mouseup', (e) => renderer.onGlobalUp(e));
window.addEventListener('mousemove', (e) => renderer.onGlobalMoveEdge(e));
window.addEventListener('mouseup', (e) => renderer.onGlobalUpEdge(e));

document.getElementById('undoBtn').onclick = () => { history.undo(); renderer.render(); history.autoSave(); };
document.getElementById('redoBtn').onclick = () => { history.redo(); renderer.render(); history.autoSave(); };
document.getElementById('addEmptyBtn').onclick = () => {
  const rect = viewportEl.getBoundingClientRect();
  const off = vp.getOffset();
  const wx = (rect.width / 2 - off.x) / currentZoom;
  const wy = (rect.height / 2 - off.y) / currentZoom;
  const node = new NumberNode(0, wx - 100, wy - 30, "Число", 0);
  graph.addNode(node);
  renderer.render();
  history.save();
  history.autoSave();
};
document.getElementById('addGroupBtn').onclick = () => {
  const rect = viewportEl.getBoundingClientRect();
  const off = vp.getOffset();
  const wx = (rect.width / 2 - off.x) / currentZoom;
  const wy = (rect.height / 2 - off.y) / currentZoom;
  const node = new GroupNode(0, wx - 120, wy - 30, "Группа чисел", [{ name: "Значение 1", val: 0 }]);
  graph.addNode(node);
  renderer.render();
  history.save();
  history.autoSave();
};
document.getElementById('addOutputBtn').onclick = () => {
  const rect = viewportEl.getBoundingClientRect();
  const off = vp.getOffset();
  const wx = (rect.width / 2 - off.x) / currentZoom;
  const wy = (rect.height / 2 - off.y) / currentZoom;
  const node = new OutputNode(0, wx - 100, wy - 30, "Вывод", []);
  graph.addNode(node);
  renderer.render();
  history.save();
  history.autoSave();
};
document.getElementById('exportBtn').onclick = () => {
  const data = graph.toSerial();
  data.viewportOffsetX = vp.x;
  data.viewportOffsetY = vp.y;
  data.viewportZoom = currentZoom;
  data.designQuality = window.currentQualityValue;
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diagram_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.amnk`;
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('clearStorageBtn').onclick = () => {
  if (confirm('Очистить все сохраненные данные?')) {
    localStorage.removeItem('amenodes_autosave');
    alert('Очищено');
  }
};
document.getElementById('fileInput').onchange = (e) => {
  if (e.target.files.length) {
    const file = e.target.files[0];
    const reader = new FileReader();
    const backup = graph.toSerial();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        graph.loadFrom(data);
        if (data.viewportOffsetX !== undefined) vp.setOffset(data.viewportOffsetX, data.viewportOffsetY);
        if (data.viewportZoom !== undefined) window.setZoom(data.viewportZoom);
        if (data.designQuality !== undefined) window.applyDesignQuality(data.designQuality);
        renderer.render();
        history.save();
        history.autoSave();
      } catch (err) {
        graph.loadFrom(backup);
        alert("Ошибка импорта");
      }
    };
    reader.readAsText(file);
  }
  e.target.value = '';
};

if (!history.loadFromStorage()) {
  const defaultOutput = new OutputNode(0, 400, 300, "Вывод результатов", []);
  graph.addNode(defaultOutput);
  renderer.render();
  history.save();
  history.autoSave();
} else {
  renderer.render();
}

let realGains = new Array(OPTIMIZATIONS.length).fill(0);
let baselineFPS = 0;
let benchmarking = false;

async function runBenchmark(notify = true) {
  if (benchmarking) return;
  benchmarking = true;
  const statusEl = document.getElementById('benchmarkStatus');
  if (notify) statusEl.style.display = 'block';
  
  const savedVirtual = renderer.virtual;
  const savedHistoryMax = history.maxSize;
  const savedWillChange = renderer.opts.willChange;
  const savedContain = renderer.opts.contain;
  const savedPointerEvents = renderer.opts.pointerEvents;
  
  renderer.setVirtual(false);
  history.maxSize = 50;
  renderer.opts.willChange = false;
  renderer.opts.contain = false;
  renderer.opts.pointerEvents = false;
  
  if (notify) statusEl.innerHTML = 'Измерение базовой...';
  await new Promise(r => setTimeout(r, 500));
  baselineFPS = await fpsCounter.measure(1500);
  if (notify) statusEl.innerHTML = `Базовый FPS: ${baselineFPS}`;
  await new Promise(r => setTimeout(r, 800));
  
  for (let i = 0; i < OPTIMIZATIONS.length; i++) {
    const opt = OPTIMIZATIONS[i];
    if (opt.type === 'slider') continue;
    if (notify) statusEl.innerHTML = `Тест: ${opt.name}... (${i + 1}/${OPTIMIZATIONS.length})`;
    if (!opt.impl) {
      realGains[i] = 0;
      continue;
    }
    
    if (i === 0) renderer.setVirtual(true);
    else if (i === 1) canvasContainer.style.transform = 'translate3d(0,0,0)';
    else if (i === 5) renderer.opts.willChange = true;
    else if (i === 9) renderer.opts.contain = true;
    else if (i === 12) renderer.opts.pointerEvents = true;
    else if (i === 15) history.maxSize = 20;
    
    await new Promise(r => setTimeout(r, 100));
    const fps = await fpsCounter.measure(1000);
    const gain = Math.round(((fps - baselineFPS) / baselineFPS) * 100);
    realGains[i] = Math.max(0, gain);
    if (notify) statusEl.innerHTML = `${opt.name}: +${realGains[i]}% -> ${fps} FPS`;
    
    if (i === 0) renderer.setVirtual(false);
    else if (i === 1) canvasContainer.style.transform = '';
    else if (i === 5) renderer.opts.willChange = false;
    else if (i === 9) renderer.opts.contain = false;
    else if (i === 12) renderer.opts.pointerEvents = false;
    else if (i === 15) history.maxSize = 50;
    
    await new Promise(r => setTimeout(r, 100));
  }
  
  renderer.setVirtual(savedVirtual);
  history.maxSize = savedHistoryMax;
  renderer.opts.willChange = savedWillChange;
  renderer.opts.contain = savedContain;
  renderer.opts.pointerEvents = savedPointerEvents;
  renderer.render();
  
  if (notify) statusEl.innerHTML = `Тест завершён. Базовый FPS: ${baselineFPS}`;
  setTimeout(() => { if (notify) statusEl.style.display = 'none'; }, 3000);
  benchmarking = false;
}

function applyOptimizations(state) {
  if (state[0]) renderer.setVirtual(true);
  else renderer.setVirtual(false);
  
  if (state[1]) canvasContainer.style.transform = 'translate3d(0,0,0)';
  else canvasContainer.style.transform = '';
  
  renderer.opts.willChange = state[5];
  renderer.opts.contain = state[9];
  renderer.opts.pointerEvents = state[12];
  renderer.applyOptStyles = function(el) {
    if (this.opts.willChange) el.style.willChange = 'left, top';
    else el.style.willChange = '';
    if (this.opts.contain) el.style.contain = 'layout paint';
    else el.style.contain = '';
  };
  
  if (state[15]) history.maxSize = 20;
  else history.maxSize = 50;
  
  window.applyDesignQuality(window.currentQualityValue);
  renderer.render();
}

optPanel.setCallbacks(applyOptimizations, runBenchmark, (value) => {
  window.currentQualityValue = value;
  window.applyDesignQuality(value);
  renderer.render();
});

optPanel.buildPanel(window.currentQualityValue);
optPanel.updateGains(realGains);

setTimeout(() => {
  runBenchmark(true).then(() => {
    optPanel.updateGains(realGains);
    optPanel.buildPanel(window.currentQualityValue);
  });
}, 1000);
</script>
