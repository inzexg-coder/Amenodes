<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>@Amenodes - Node Editor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a2742'/%3E%3Cpath d='M50 25 Q40 20 35 30 Q30 40 40 45 Q35 55 45 60 Q55 65 60 50 Q65 35 55 30 Q50 25 50 25Z' fill='%233a5ba0'/%3E%3Cpath d='M50 35 Q45 32 42 40 Q39 48 48 50 Q52 52 55 45 Q58 38 52 35 Q50 35 50 35Z' fill='%236d8ae0'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div id="splashOverlay" class="splash-overlay">
  <div class="splash-card">
    <div class="splash-logo">
      <i class="fas fa-project-diagram"></i>
      <span>@Amenodes</span>
    </div>
    <div class="splash-title">Node Editor v2.0</div>
    <div class="splash-actions">
      <button id="newCanvasBtn" class="splash-btn primary"><i class="fas fa-plus-circle"></i> New Canvas</button>
      <button id="loadCanvasBtn" class="splash-btn secondary"><i class="fas fa-folder-open"></i> Load Canvas</button>
      <button id="splashSettingsBtn" class="splash-btn secondary"><i class="fas fa-sliders-h"></i> Settings</button>
    </div>
    <div class="splash-footer">
      <span><i class="fas fa-microchip"></i> 60 FPS Ready</span>
      <span><i class="fas fa-palette"></i> GPU Acceleration</span>
    </div>
  </div>
</div>

<div id="appContainer" class="app-container hidden">

  <div class="top-bar">
    <div class="logo-area">
      <i class="fas fa-project-diagram"></i>
      <span>@Amenodes</span>
    </div>
    
    <div class="canvas-controls">
      <button id="canvasSettingsBtn" class="top-btn" title="Canvas Settings"><i class="fas fa-sliders-h"></i></button>
      <button id="canvasExportBtn" class="top-btn" title="Export"><i class="fas fa-download"></i></button>
      <button id="canvasImportBtn" class="top-btn" title="Import"><i class="fas fa-upload"></i></button>
      <div class="divider"></div>
      <button id="undoBtn" class="top-btn" title="Undo"><i class="fas fa-undo-alt"></i></button>
      <button id="redoBtn" class="top-btn" title="Redo"><i class="fas fa-redo-alt"></i></button>
    </div>
    
    <div class="right-controls">
      <div class="zoom-indicator" id="zoomIndicator">100%</div>
      <button id="addNodeBtn" class="top-btn primary" title="Add Node"><i class="fas fa-plus"></i> Node</button>
      <button id="optToggleBtn" class="top-btn" title="Optimizations"><i class="fas fa-tachometer-alt"></i></button>
      <div class="divider"></div>
      <button id="clearStorageBtn" class="top-btn danger" title="Clear Storage"><i class="fas fa-trash-alt"></i></button>
    </div>
  </div>

  <div class="workspace">
    
    <div class="sidebar left-sidebar" id="leftSidebar">
      <div class="sidebar-header">
        <i class="fas fa-cubes"></i>
        <span>Nodes Library</span>
        <button id="collapseLeftBtn" class="collapse-btn"><i class="fas fa-chevron-left"></i></button>
      </div>
      <div class="sidebar-content" id="nodesLibraryList">
        <div class="loading-nodes"><i class="fas fa-spinner fa-pulse"></i> Loading nodes...</div>
      </div>
    </div>

    <div class="viewport-container">
      <div class="viewport" id="viewport">
        <div class="canvas-container" id="canvasContainer">
          <div class="nodes-layer" id="nodesLayer"></div>
        </div>
        <canvas id="webglCanvas" class="webgl-canvas" style="display:none;"></canvas>
      </div>
    </div>

    <div class="sidebar right-sidebar" id="rightSidebar">
      <div class="sidebar-header">
        <i class="fas fa-info-circle"></i>
        <span>Properties</span>
        <button id="collapseRightBtn" class="collapse-btn"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="sidebar-content" id="propertiesPanel">
        <div class="empty-property">
          <i class="fas fa-hand-pointer"></i>
          <p>Select a node to edit properties</p>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <span id="nodeCount">0 nodes</span>
      <span id="edgeCount">0 connections</span>
    </div>
    <div class="status-center">
      <div class="coord-indicator" id="coordIndicator">X: 0.00 | Y: 0.00</div>
    </div>
    <div class="status-right">
      <div class="fps-meter" id="fpsMeter"><i class="fas fa-chart-line"></i> FPS: --</div>
      <div class="autosave-status" id="autosaveStatus"><i class="fas fa-save"></i> Saved</div>
    </div>
  </div>

</div>

<div id="optPanel" class="opt-panel hidden">
  <div class="opt-header">
    <span><i class="fas fa-microchip"></i> Performance Optimizations</span>
    <button id="closeOptPanel"><i class="fas fa-times"></i></button>
  </div>
  <div class="opt-list" id="optListContainer"></div>
  <button id="rebenchmarkBtn" class="rebench-btn"><i class="fas fa-chart-line"></i> Recalculate optimizations impact</button>
  <button id="applyOptimizationsBtn" class="apply-btn"><i class="fas fa-check-circle"></i> APPLY SELECTED</button>
</div>

<div id="canvasSettingsModal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-sliders-h"></i> Canvas Settings</h3>
      <button class="modal-close" id="closeSettingsModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label>Background Color</label>
        <div class="color-presets">
          <div class="color-preset" data-bg="radial-gradient(circle at 20% 30%, #1a1e2c, #0a0c14)" style="background:#1a1e2c"></div>
          <div class="color-preset" data-bg="radial-gradient(circle at 20% 30%, #2a2a3a, #14141f)" style="background:#2a2a3a"></div>
          <div class="color-preset" data-bg="radial-gradient(circle at 20% 30%, #1e2a2a, #0f1414)" style="background:#1e2a2a"></div>
          <div class="color-preset" data-bg="#0a0c14" style="background:#0a0c14"></div>
        </div>
      </div>
      <div class="setting-group">
        <label>Grid Style</label>
        <select id="gridStyleSelect">
          <option value="dots">Dots</option>
          <option value="lines">Lines</option>
          <option value="cross">Cross</option>
          <option value="none">None</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Snap to Grid</label>
        <input type="checkbox" id="snapToGrid">
      </div>
      <div class="setting-group">
        <label>Grid Size (px)</label>
        <input type="number" id="gridSize" value="20" min="10" max="50" step="5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn secondary" id="cancelSettings">Cancel</button>
      <button class="modal-btn primary" id="applySettings">Apply</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" class="hidden-file-input" accept=".amnk">
<div id="benchmarkStatus" class="benchmark-status" style="display:none;"><i class="fas fa-flask"></i> Benchmarking optimizations...</div>

<script type="importmap">
{
  "imports": {
    "./src/main.js": "./src/main.js"
  }
}
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
