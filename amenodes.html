<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080610">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>@Amenodes 3D</title>
<link rel="stylesheet" href="styles/main.css">
<style>
/* MOBILE-FIRST RESET */
* { -webkit-tap-highlight-color: transparent; outline: none; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #080610;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* 3D CONTAINER - fills entire screen */
#scene-container {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

#scene-container canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* MOBILE BOTTOM TOOLBAR */
.mobile-toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
  background: linear-gradient(180deg, rgba(8,6,16,0) 0%, rgba(8,6,16,0.92) 40%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(120,80,200,0.12);
}

.mobile-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: rgba(180,160,240,0.7);
  padding: 8px 16px;
  min-width: 56px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.mobile-btn:active {
  background: rgba(120,80,200,0.15);
  color: #b090ff;
  transform: scale(0.92);
}

.mobile-btn.active {
  color: #b090ff;
}

.mobile-btn svg {
  display: block;
}

/* NODE TYPE MENU (bottom sheet) */
.mobile-node-menu {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(12,8,28,0.98);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 8px));
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  border-top: 1px solid rgba(120,80,200,0.15);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 70vh;
  overflow-y: auto;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.node-menu-header {
  font-size: 14px;
  font-weight: 700;
  color: rgba(180,160,240,0.6);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-align: center;
}

.node-types-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.type-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(120,80,200,0.12);
  border-radius: 16px;
  padding: 16px 8px;
  cursor: pointer;
  transition: all 0.2s;
  touch-action: manipulation;
}

.type-btn:active {
  background: rgba(120,80,200,0.15);
  border-color: rgba(140,90,255,0.3);
  transform: scale(0.95);
}

.type-icon {
  font-size: 24px;
  line-height: 1;
}

.type-name {
  font-size: 11px;
  color: rgba(180,160,240,0.8);
  font-weight: 600;
}

/* CONNECTION MODE INDICATOR */
.mobile-conn-mode {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(12,8,28,0.9);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(140,80,255,0.3);
  border-radius: 20px;
  padding: 10px 24px;
  color: #b090ff;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }


/* STATUS OVERLAY (top) */
.status-overlay {
  position: fixed;
  top: env(safe-area-inset-top, 12px);
  left: 16px;
  z-index: 50;
  display: flex;
  gap: 8px;
  align-items: center;
}

.status-badge {
  background: rgba(8,6,18,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(120,80,200,0.1);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(180,160,240,0.6);
  font-family: monospace;
}

/* SPLASH OVERRIDES FOR 3D */
.splash-overlay {
  z-index: 500 !important;
}

/* Loading spinner */
.loading-3d {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #080610;
  z-index: 999;
  transition: opacity 0.5s;
}

.loading-3d.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid rgba(120,80,200,0.1);
  border-top-color: #9060ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-3d span {
  margin-top: 16px;
  color: rgba(160,140,220,0.6);
  font-size: 13px;
  font-family: monospace;
}

/* HIDE DESKTOP ELEMENTS */
.desktop-only { display: none; }


/* EMPTY STATE HINT */
.empty-hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  transition: opacity 0.5s;
}
.empty-hint.hidden { opacity: 0; }
.hint-icon {
  font-size: 48px;
  color: rgba(120,80,200,0.2);
  text-shadow: 0 0 30px rgba(120,80,200,0.1);
  animation: hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { transform: scale(1); opacity: 0.2; }
  50% { transform: scale(1.1); opacity: 0.4; }
}
.hint-text {
  font-size: 14px;
  color: rgba(160,140,220,0.4);
  font-family: monospace;
}
.hint-text strong { color: rgba(180,160,240,0.6); }

/* Status badge - minimalist */
.status-overlay {
  pointer-events: none;
}
.status-badge {
  cursor: default;
  transition: all 0.2s;
  font-size: 11px;
  padding: 3px 10px;
}
.status-badge:active {
  background: rgba(120,80,200,0.2);
  transform: scale(0.95);
}


/* NODE INFO PANEL */
.node-info {
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  z-index: 150;
  background: rgba(12,8,28,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(120,80,200,0.15);
  padding: 16px 20px;
  animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  max-width: 400px;
  margin: 0 auto;
}
.node-info.hidden { display: none; }

.info-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.info-title {
  font-size: 16px;
  font-weight: 700;
  color: #e0d0ff;
}
.info-close {
  background: none;
  border: none;
  color: rgba(160,140,220,0.5);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

.info-body {
  margin-bottom: 12px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(120,80,200,0.06);
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: rgba(160,140,220,0.5); text-transform: uppercase; letter-spacing: 1px; }
.info-value { font-size: 14px; color: #d0c0ff; font-family: monospace; }

.info-actions {
  display: flex;
  gap: 8px;
}
.info-btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  touch-action: manipulation;
}
.info-btn:active { transform: scale(0.96); }
.info-btn { background: rgba(255,60,80,0.15); color: #ff6b7a; }
.info-btn:active { background: rgba(255,60,80,0.25); }
.info-btn-secondary { background: rgba(120,80,200,0.15); color: #b090ff; }
.info-btn-secondary:active { background: rgba(120,80,200,0.25); }

/* LANDSCAPE ADJUSTMENTS */
@media (min-aspect-ratio: 1/1) {
  .mobile-toolbar {
    padding: 8px 40px calc(8px + env(safe-area-inset-bottom, 8px));
  }
  .node-types-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* DARK MODE SAFE */
@media (prefers-color-scheme: dark) {
  :root { color-scheme: dark; }
}
</style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-3d" id="loading3d">
    <div class="spinner" id="loadingSpinner"></div>
    <span id="loadingText">Initializing Neural Network...</span>
  </div>

  <!-- 3D Scene -->
  <div id="scene-container"></div>

  <!-- Node info panel (shown on tap) -->
  <div class="node-info hidden" id="nodeInfo">
    <div class="info-header">
      <span class="info-title" id="infoTitle">Node</span>
      <button class="info-close" id="infoClose">✕</button>
    </div>
    <div class="info-body">
      <div class="info-row"><span class="info-label">Type</span><span class="info-value" id="infoType">-</span></div>
      <div class="info-row"><span class="info-label">Value</span><span class="info-value" id="infoValue">-</span></div>
      <div class="info-row"><span class="info-label">Connections</span><span class="info-value" id="infoConns">0</span></div>
    </div>
    <div class="info-actions">
      <button class="info-btn" id="infoDelete">Delete</button>
      <button class="info-btn info-btn-secondary" id="infoImportant">★ Important</button>
    </div>
  </div>

  <!-- Empty state hint -->
  <div class="empty-hint" id="emptyHint">
    <div class="hint-icon">✦</div>
    <div class="hint-text">Tap <strong>+</strong> to add your first neuron</div>
  </div>

  <!-- Status badge (auto-hides after a few seconds) -->
  <div class="status-overlay" id="statusOverlay" style="opacity:0;transition:opacity 0.5s;">
    <span class="status-badge" id="mNodeCount">0 nodes</span>
  </div>

  <!-- Splash Screen (from original, but hidden initially) -->
  <div id="splashOverlay" class="splash-overlay" style="display:none;">
    <div class="splash-card">
      <div class="splash-logo">
        <i class="fas fa-brain"></i>
        <span>Amenodes</span>
      </div>
      <div class="splash-title">Neural Data Analysis</div>
      <div class="splash-actions">
        <button id="newCanvasBtn" class="splash-btn primary">
          <i class="fas fa-plus-circle"></i> New Canvas
        </button>
        <button id="loadCanvasBtn" class="splash-btn secondary">
          <i class="fas fa-folder-open"></i> Load
        </button>
      </div>
      <div class="splash-footer">
        <span><i class="fas fa-code-branch"></i> v2.7.0</span>
        <span><i class="fas fa-globe"></i> 3D</span>
      </div>
    </div>
  </div>

  <!-- File Input (hidden) -->
  <input type="file" id="fileInput" accept=".amnk" style="display:none">

  <!-- Scripts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  
  <script type="module">
    // Global error handler
    window.addEventListener('error', (e) => {
      console.error('Global error:', e);
      document.getElementById('loadingText').textContent = 'Error: ' + (e.message || 'Unknown');
      document.getElementById('loadingSpinner').style.display = 'none';
    });
    
    // Disable context menu on long press
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // Dynamic import all dependencies
    const { Graph } = await import('./src/core/Graph.js');
    const { History } = await import('./src/core/History.js');
    const { PersistenceService } = await import('./src/services/PersistenceService.js');
    const { EventBus } = await import('./src/services/EventBus.js');
    const { Scene3D } = await import('./src/renderer3d/Scene3D.js');
    const { MobileUI } = await import('./src/renderer3d/MobileUI.js');
    const { i18n, t } = await import('./src/i18n/LanguageManager.js');
    const { modal } = await import('./src/ui/CustomModal.js');
    const { loadAllNodes, nodeRegistry } = await import('./src/nodes/registry.js');
    const { typeSystem } = await import('./src/core/DataType.js');
    const { NodeFactory } = await import('./src/nodes/NodeFactory.js');

    window.alert = (msg) => modal.alert(msg);
    window.confirm = (msg) => modal.confirm(msg);
    window.prompt = (msg, def) => modal.prompt(msg, def);

    class Application3D {
      constructor() {
        this.graph = new Graph();
        this.eventBus = new EventBus();
        this.persistenceService = new PersistenceService(this.graph);
        
        this.initScene();
        this.initHistory();
        this.initUI();
        this.initI18n();
        
        this.loadSavedData();
      
      // Show/hide empty hint
      this.graph.onDirtyChange(() => {
        const hint = document.getElementById('emptyHint');
        if (hint) {
          hint.classList.toggle('hidden', this.graph.nodes.length > 0);
        }
      });
      
      // Auto-show status on changes, fade after 3s
      this.eventBus.on('nodeSelect', () => this._flashStatus());
      
      // Initial flash
      setTimeout(() => this._flashStatus(), 500);
      }

      async initScene() {
        const container = document.getElementById('scene-container');
        this.scene3d = new Scene3D(this.graph, container, this.eventBus);
        await this.scene3d.init();
        
        // Hide loading screen
        document.getElementById('loading3d').classList.add('hidden');
      }

      initHistory() {
        this.history = new History(this.graph);
        this.history.onSave = () => {
          this.scene3d.refresh();
        };
      }

      initUI() {
        this.mobileUI = new MobileUI(this, this.scene3d, this.graph);
        this.mobileUI.createDOM();
        this.updateNodeCount();
        this.updateEdgeCount();
        
        // Fix import handler
        document.getElementById('fileInput').addEventListener('change', (e) => {
          this.handleFileImport(e);
        });
      }

      async loadSavedData() {
        const saved = localStorage.getItem('amenodes_autosave_3d');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            this.graph.loadFrom(data);
          } catch (e) {
            console.warn('Failed to load saved data:', e);
          }
        }
        // Also try loading from original autosave key
        const savedOld = localStorage.getItem('amenodes_autosave');
        if (savedOld && !saved) {
          try {
            const data = JSON.parse(savedOld);
            this.graph.loadFrom(data);
          } catch (e) {}
        }
        
        this.scene3d.refresh();
        this.updateNodeCount();
        this.updateEdgeCount();
      }

      initI18n() {
        i18n.subscribe(() => {
          this.updateNodeCount();
        });
      }

      updateNodeCount() {
        const el = document.getElementById('mNodeCount');
        if (el) {
          el.textContent = `${this.graph.nodes.length} node${this.graph.nodes.length !== 1 ? 's' : ''}`;
        }
        this._flashStatus();
      }

      updateEdgeCount() {
        // Can show edge count in the future
      }

      export() {
        this.persistenceService.exportToFile('amenodes-3d');
      }

      import() {
        document.getElementById('fileInput').click();
      }

      async handleFileImport(event) {
        if (!event.target.files.length) return;
        const file = event.target.files[0];
        const success = await this.persistenceService.importFromFile(file);
        if (success) {
          this.scene3d.refresh();
          this.history.save();
          this.updateNodeCount();
          this.updateEdgeCount();
          this.graph.clearDirty();
        }
        event.target.value = '';
      }

      openSettings() {
        // Simple alert for now - can expand later
        modal.alert('Amenodes 3D v2.7.0\n\nNeural Network Visualization\n\nBuilt with Three.js');
      }

      _flashStatus() {
        const el = document.getElementById('statusOverlay');
        if (el) {
          el.style.opacity = '1';
          clearTimeout(this._statusTimer);
          this._statusTimer = setTimeout(() => { el.style.opacity = '0'; }, 3000);
        }
      }
    }

    // Start the app
    window.app = new Application3D();
  </script>
</body>
</html>
